<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stave Explorer - Kids Note Guessing Game</title>
    <!-- Tailwind CSS for modern responsive aesthetics -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&family=Noto+Music&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #fef08a 0%, #bbf7d0 100%);
            min-height: 100vh;
        }

        .kids-title {
            font-family: 'Fredoka One', cursive;
            text-shadow: 2px 2px 0px #15803d;
        }

        .bouncy {
            animation: bounce 0.3s ease infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }

        /* Prevent double tap zoom on mobile */
        button {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="py-6 px-4 flex items-center justify-center">

    <div class="max-w-xl w-full bg-white rounded-3xl shadow-2xl border-4 border-green-400 p-6 relative overflow-hidden">
        
        <!-- Header / Scoreboard -->
        <div class="flex justify-between items-center mb-4">
            <!-- Score & Streak -->
            <div class="flex gap-2">
                <span class="bg-yellow-100 text-yellow-700 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    ⭐ Score: <span id="score">0</span>
                </span>
                <span class="bg-orange-100 text-orange-700 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    🔥 Streak: <span id="streak">0</span>
                </span>
            </div>

            <!-- Hearts / Anti-Spam Health -->
            <div class="flex items-center gap-1 text-2xl" id="hearts-container">
                ❤️❤️❤️
            </div>
        </div>

        <!-- Title -->
        <h1 class="kids-title text-4xl text-green-600 text-center mb-3">Stave Explorer</h1>
        <p class="text-slate-600 text-center text-sm font-semibold mb-6">Learn notes step-by-step!</p>

        <!-- Clef & Stage Selection Controls -->
        <div class="bg-emerald-50 p-3 rounded-2xl mb-6 border border-emerald-100">
            <!-- Clef Toggle -->
            <div class="flex justify-center gap-2 mb-3">
                <button id="btn-treble" onclick="setClef('treble')" class="flex-1 py-2 px-4 rounded-xl font-bold text-sm transition-all duration-200 transform hover:scale-105 bg-green-500 text-white shadow-md border-b-4 border-green-700">
                    🎼 Treble Clef
                </button>
                <button id="btn-bass" onclick="setClef('bass')" class="flex-1 py-2 px-4 rounded-xl font-bold text-sm transition-all duration-200 transform hover:scale-105 bg-slate-200 text-slate-700 border-b-4 border-slate-400">
                    𝄢 Bass Clef
                </button>
            </div>

            <!-- Stage Progressor -->
            <div class="grid grid-cols-3 gap-2">
                <button id="btn-stage-1" onclick="setStage(1)" class="py-1.5 px-2 rounded-lg text-xs font-bold border-2 border-emerald-400 bg-emerald-400 text-white shadow-sm">
                    Stage 1: Easy
                </button>
                <button id="btn-stage-2" onclick="setStage(2)" class="py-1.5 px-2 rounded-lg text-xs font-bold border-2 border-slate-300 bg-slate-100 text-slate-600">
                    Stage 2: Medium
                </button>
                <button id="btn-stage-3" onclick="setStage(3)" class="py-1.5 px-2 rounded-lg text-xs font-bold border-2 border-slate-300 bg-slate-100 text-slate-600">
                    Stage 3: Hard
                </button>
            </div>
            
            <!-- Stage Goal Text -->
            <div id="stage-description" class="text-center text-slate-500 text-xs mt-2 font-medium">
                Stage 1 Note Range: Middle C to G
            </div>
        </div>

        <!-- Musical Canvas Wrapper -->
        <div class="relative bg-slate-50 rounded-2xl p-4 border-2 border-slate-200 mb-6 flex justify-center items-center">
            <canvas id="canvas" width="400" height="220" class="max-w-full rounded-lg bg-white shadow-inner"></canvas>
            
            <!-- Overlay Message Box (for Game Over or Stage Completed) -->
            <div id="overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-2xl flex flex-col justify-center items-center p-6 text-center hidden transition-opacity duration-300">
                <h3 id="overlay-title" class="kids-title text-3xl text-green-600 mb-2">Wonderful!</h3>
                <p id="overlay-msg" class="text-slate-600 font-bold mb-4">You passed the stage!</p>
                <button id="overlay-btn" onclick="dismissOverlay()" class="bg-yellow-400 text-slate-800 font-extrabold px-6 py-2.5 rounded-full border-b-4 border-yellow-600 hover:brightness-105 active:scale-95 transition-all">
                    Play Next Round!
                </button>
            </div>
        </div>

        <!-- Feedback Banner -->
        <div id="feedback" class="text-center text-lg font-bold min-h-[32px] text-slate-700 mb-4 transition-all duration-150">
            Can you name this note?
        </div>

        <!-- Dynamic Note Guessing Buttons -->
        <div class="grid grid-cols-7 gap-1.5 mb-6" id="input-buttons">
            <!-- Dynamic note keys will inject here (A, B, C, D, E, F, G) -->
        </div>

        <!-- Footer Extras -->
        <div class="flex justify-between items-center text-xs">
            <button onclick="toggleHints()" class="bg-purple-100 text-purple-700 border-b-2 border-purple-300 font-bold px-4 py-2 rounded-xl hover:bg-purple-200 active:translate-y-0.5">
                💡 <span id="hint-btn-text">Turn Hints On</span>
            </button>
            <button onclick="resetGame()" class="bg-rose-100 text-rose-700 border-b-2 border-rose-300 font-bold px-4 py-2 rounded-xl hover:bg-rose-200 active:translate-y-0.5">
                🔄 Reset Game
            </button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // State variables
        let currentClef = 'treble'; // 'treble' | 'bass'
        let currentStage = 1;       // 1 | 2 | 3
        let currentNote = null;
        let score = 0;
        let streak = 0;
        let lives = 3;
        let hintsEnabled = false;
        let controlLock = false; // Prevents double-clicking during transition or sound trigger

        // Audio System (Using Web Audio API)
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        // Kid-friendly synthesizer
        function playNoteSound(freq) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'triangle'; // Smoother, soft tone for children
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05); // Attack
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5); // Decay
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) {
                console.log("Audio Web Context not unlocked yet.", e);
            }
        }

        // Custom chime for success
        function playChime() {
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0.15, now + idx * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.2);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.2);
                });
            } catch (e) {}
        }

        // Error buzz
        function playBuzz() {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch (e) {}
        }

        // Definitions of Treble Clef note pool
        // 'lineStep' matches position relative to bottom line of staff (0 = bottom line, 1 = space 1, 2 = line 2, etc.)
        const TREBLE_NOTES = [
            { name: 'C', octave: 4, lineStep: -2, freq: 261.63, isLedger: true, desc: 'Middle C (sitting below the lines with its own seat belt!)' },
            { name: 'D', octave: 4, lineStep: -1, freq: 293.66, desc: 'D (hanging like a balloon just underneath the roof!)' },
            { name: 'E', octave: 4, lineStep: 0, freq: 329.63, desc: 'E (on the very bottom line)' },
            { name: 'F', octave: 4, lineStep: 1, freq: 349.23, desc: 'F (inside the lowest space. Spells F-A-C-E!)' },
            { name: 'G', octave: 4, lineStep: 2, freq: 392.00, desc: 'G (sleeping on the second line)' },
            { name: 'A', octave: 4, lineStep: 3, freq: 440.00, desc: 'A (inside the second space. Spells F-A-C-E!)' },
            { name: 'B', octave: 4, lineStep: 4, freq: 493.88, desc: 'B (resting on the middle line)' },
            { name: 'C', octave: 5, lineStep: 5, freq: 523.25, desc: 'C (inside the third space. Spells F-A-C-E!)' },
            { name: 'D', octave: 5, lineStep: 6, freq: 587.33, desc: 'D (on the fourth line)' },
            { name: 'E', octave: 5, lineStep: 7, freq: 659.25, desc: 'E (inside the top space. Spells F-A-C-E!)' },
            { name: 'F', octave: 5, lineStep: 8, freq: 698.46, desc: 'F (on the top line)' },
            { name: 'G', octave: 5, lineStep: 9, freq: 783.99, desc: 'G (perched high up, right above the top line!)' }
        ];

        // Definitions of Bass Clef note pool
        // 0 = bottom line (G2)
        const BASS_NOTES = [
            { name: 'F', octave: 2, lineStep: -1, freq: 87.31, desc: 'Low F (hanging directly underneath the staff)' },
            { name: 'G', octave: 2, lineStep: 0, freq: 98.00, desc: 'G (sitting safe on the bottom line)' },
            { name: 'A', octave: 2, lineStep: 1, freq: 110.00, desc: 'A (resting inside the bottom space)' },
            { name: 'B', octave: 2, lineStep: 2, freq: 123.47, desc: 'B (resting on the second line)' },
            { name: 'C', octave: 3, lineStep: 3, freq: 130.81, desc: 'C (snug inside the second space)' },
            { name: 'D', octave: 3, lineStep: 4, freq: 146.83, desc: 'D (resting on the middle line)' },
            { name: 'E', octave: 3, lineStep: 5, freq: 164.81, desc: 'E (inside the third space)' },
            { name: 'F', octave: 3, lineStep: 6, freq: 174.61, desc: 'F (resting on the fourth line)' },
            { name: 'G', octave: 3, lineStep: 7, freq: 196.00, desc: 'G (inside the top space)' },
            { name: 'A', octave: 3, lineStep: 8, freq: 220.00, desc: 'A (on the very top line)' },
            { name: 'B', octave: 3, lineStep: 9, freq: 246.94, desc: 'B (resting right above the top line)' },
            { name: 'C', octave: 4, lineStep: 10, freq: 261.63, isLedger: true, desc: 'Middle C (sitting on top with its own space belt!)' }
        ];

        // Stage configurations (limits the indexes allowed in the active notes lists above)
        const STAGE_CONFIGS = {
            treble: {
                1: { min: -2, max: 2, desc: "Stage 1 Range: Middle C to G" }, // C4, D4, E4, F4, G4
                2: { min: -2, max: 6, desc: "Stage 2 Range: Middle C up to D5" }, // Up to D5
                3: { min: -2, max: 9, desc: "Stage 3 Range: Full Clef (Middle C to high G)" }
            },
            bass: {
                1: { min: 3, max: 7, desc: "Stage 1 Range: Middle Bass (C3 to G3)" },
                2: { min: 0, max: 10, desc: "Stage 2 Range: G2 up to Middle C" },
                3: { min: -1, max: 10, desc: "Stage 3 Range: Full Bass Clef" }
            }
        };

        // Initialize App
        function init() {
            createButtons();
            setClef('treble');
            document.fonts.load(`${16 * 4}px "Noto Music"`).then(drawStave);
        }

        // Render keyboard guess inputs (A through G)
        function createButtons() {
            const container = document.getElementById('input-buttons');
            container.innerHTML = '';
            const notes = ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            
            // Kids-friendly colors for buttons
            const colors = [
                'bg-red-400 hover:bg-red-500 border-red-600',
                'bg-orange-400 hover:bg-orange-500 border-orange-600',
                'bg-yellow-400 hover:bg-yellow-500 border-yellow-600',
                'bg-green-400 hover:bg-green-500 border-green-600',
                'bg-teal-400 hover:bg-teal-500 border-teal-600',
                'bg-blue-400 hover:bg-blue-500 border-blue-600',
                'bg-purple-400 hover:bg-purple-500 border-purple-600'
            ];

            notes.forEach((note, index) => {
                const btn = document.createElement('button');
                btn.className = `${colors[index]} text-white text-2xl font-black py-4 rounded-2xl border-b-4 hover:-translate-y-0.5 active:translate-y-1 transition-all shadow-md`;
                btn.innerText = note;
                btn.onclick = () => makeGuess(note);
                container.appendChild(btn);
            });
        }

        // Switch Treble vs Bass Clef
        function setClef(clef) {
            currentClef = clef;
            
            // Highlight active clef tab
            const trebleBtn = document.getElementById('btn-treble');
            const bassBtn = document.getElementById('btn-bass');
            
            if (clef === 'treble') {
                trebleBtn.className = "flex-1 py-2 px-4 rounded-xl font-bold text-sm transition-all duration-200 transform bg-green-500 text-white shadow-md border-b-4 border-green-700";
                bassBtn.className = "flex-1 py-2 px-4 rounded-xl font-bold text-sm transition-all duration-200 transform bg-slate-200 text-slate-700 border-b-4 border-slate-400 hover:bg-slate-300";
            } else {
                bassBtn.className = "flex-1 py-2 px-4 rounded-xl font-bold text-sm transition-all duration-200 transform bg-green-500 text-white shadow-md border-b-4 border-green-700";
                trebleBtn.className = "flex-1 py-2 px-4 rounded-xl font-bold text-sm transition-all duration-200 transform bg-slate-200 text-slate-700 border-b-4 border-slate-400 hover:bg-slate-300";
            }

            // Lock stage back to 1 if we switch to prevent errors
            setStage(1);
        }

        // Switch progressive stage
        function setStage(stageNum) {
            currentStage = stageNum;

            // Highlight active button
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btn-stage-${i}`);
                if (i === stageNum) {
                    btn.className = "py-1.5 px-2 rounded-lg text-xs font-bold border-2 border-emerald-500 bg-emerald-500 text-white shadow-sm";
                } else {
                    btn.className = "py-1.5 px-2 rounded-lg text-xs font-bold border-2 border-slate-300 bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }

            // Render descriptive scope info
            const config = STAGE_CONFIGS[currentClef][currentStage];
            document.getElementById('stage-description').innerText = config.desc;

            newRound();
        }

        // Select and render a new note based on limits
        function newRound() {
            const config = STAGE_CONFIGS[currentClef][currentStage];
            const pool = currentClef === 'treble' ? TREBLE_NOTES : BASS_NOTES;
            
            // Filter pool to active range
            const availableNotes = pool.filter(n => n.lineStep >= config.min && n.lineStep <= config.max);
            
            // Pick random note ensuring it differs from current to maintain engagement
            let picked;
            do {
                picked = availableNotes[Math.floor(Math.random() * availableNotes.length)];
            } while (availableNotes.length > 1 && currentNote && picked.name === currentNote.name && picked.octave === currentNote.octave);

            currentNote = picked;
            controlLock = false;
            
            drawStave();
            
            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-lg font-bold text-slate-700 mb-4";
            feedback.innerText = "Can you name this note?";
        }

        // Draw staff, clef graphics, ledger lines, and note head
        function drawStave() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const staffTop = 60;
            const lineGap = 16; // spacing between staff lines
            const staffWidth = 340;
            const startX = 30;

            // 1. Draw 5 main horizontal lines
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2.5;
            for (let i = 0; i < 5; i++) {
                let y = staffTop + i * lineGap;
                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.lineTo(startX + staffWidth, y);
                ctx.stroke();
            }

            // 2. Draw Clef Symbol (Using styled text rendering inside canvas for native accuracy)
            ctx.textBaseline = 'alphabetic';
            ctx.textAlign = 'left';
            if (currentClef === 'treble') {
                ctx.font = `${lineGap * 4}px "Noto Music", serif`;
                ctx.fillStyle = '#1e293b';
                ctx.fillText("\u{1D11E}", startX + 6, staffTop + 4 * lineGap);
            } else {
                ctx.font = `${lineGap * 4}px "Noto Music", serif`;
                ctx.fillStyle = '#1e293b';
                ctx.fillText("\u{1D122}", startX + 6, staffTop + 3.625 * lineGap);
            }

            // 3. Render note details
            // lineStep coordinates: 0 is bottom line (Line 1). 
            // Staff Line Positions from top to bottom:
            // Line 5: step 8, Line 4: step 6, Line 3: step 4, Line 2: step 2, Line 1: step 0.
            const noteY = staffTop + (4 - (currentNote.lineStep / 2)) * lineGap;
            const noteX = canvas.width / 2 + 30;

            // 4. Draw Ledger Line(s) if applicable
            // Under bottom line
            if (currentNote.lineStep <= -2) {
                // Draw ledger lines from index -2 down to target even position
                for (let i = -2; i >= currentNote.lineStep; i -= 2) {
                    let ledgerY = staffTop + (4 - (i / 2)) * lineGap;
                    ctx.beginPath();
                    ctx.moveTo(noteX - 18, ledgerY);
                    ctx.lineTo(noteX + 18, ledgerY);
                    ctx.stroke();
                }
            }
            // Above top line
            if (currentNote.lineStep >= 10) {
                // Draw ledger lines from index 10 up to target even position
                for (let i = 10; i <= currentNote.lineStep; i += 2) {
                    let ledgerY = staffTop + (4 - (i / 2)) * lineGap;
                    ctx.beginPath();
                    ctx.moveTo(noteX - 18, ledgerY);
                    ctx.lineTo(noteX + 18, ledgerY);
                    ctx.stroke();
                }
            }

            // 5. Draw Note Head (ellipsoid tilt standard in musical notation)
            ctx.save();
            ctx.translate(noteX, noteY);
            ctx.rotate(-0.25);
            ctx.fillStyle = '#2563eb'; // Royal blue note head for high kid-friendly engagement
            ctx.beginPath();
            ctx.ellipse(0, 0, 11, 7.5, 0, 0, 2 * Math.PI);
            ctx.fill();
            
            // Highlight gloss reflection inside note
            ctx.fillStyle = '#93c5fd';
            ctx.beginPath();
            ctx.ellipse(-3, -2, 4, 2, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.restore();

            // 6. Support Stem direction
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            if (currentNote.lineStep >= 4) {
                // Stem pointing down on left side
                ctx.moveTo(noteX - 10, noteY);
                ctx.lineTo(noteX - 10, noteY + 45);
            } else {
                // Stem pointing up on right side
                ctx.moveTo(noteX + 10, noteY);
                ctx.lineTo(noteX + 10, noteY - 45);
            }
            ctx.stroke();

            // 7. Render Child Hint text overlays if turned on
            if (hintsEnabled) {
                ctx.fillStyle = '#6d28d9';
                ctx.font = 'bold 13px Quicksand, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(currentNote.desc, canvas.width / 2, canvas.height - 15);
            }
        }

        // Process guess matching
        function makeGuess(letter) {
            if (controlLock) return; // Prevent input processing during sound triggers

            const feedback = document.getElementById('feedback');

            if (letter === currentNote.name) {
                // Correct Match
                score += 10;
                streak++;
                document.getElementById('score').innerText = score;
                document.getElementById('streak').innerText = streak;

                feedback.className = "text-center text-lg font-bold text-green-600 mb-4 bouncy";
                feedback.innerText = "⭐ Brilliant! You are right! ⭐";
                
                playNoteSound(currentNote.freq);
                controlLock = true;

                // Stage completion condition (Every 10 successful streaks wins or levels up)
                if (streak > 0 && streak % 10 === 0) {
                    setTimeout(() => {
                        triggerStageComplete();
                    }, 500);
                } else {
                    setTimeout(() => {
                        newRound();
                    }, 1200);
                }
            } else {
                // Incorrect Match
                streak = 0;
                lives--;
                document.getElementById('streak').innerText = streak;
                updateHearts();

                feedback.className = "text-center text-lg font-bold text-rose-600 mb-4";
                feedback.innerText = "Close! Look closely and try again!";
                
                playBuzz();

                // Lock input temporarily to let child recognize wrong attempt
                controlLock = true;
                setTimeout(() => {
                    controlLock = false;
                }, 800);

                if (lives <= 0) {
                    setTimeout(() => {
                        triggerGameOver();
                    }, 600);
                }
            }
        }

        // Handle hearts health display
        function updateHearts() {
            const container = document.getElementById('hearts-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                if (i < lives) {
                    container.innerHTML += '❤️';
                } else {
                    container.innerHTML += '🖤';
                }
            }
        }

        // Action when 10 points streak milestone reached
        function triggerStageComplete() {
            playChime();
            const overlay = document.getElementById('overlay');
            const oTitle = document.getElementById('overlay-title');
            const oMsg = document.getElementById('overlay-msg');
            const oBtn = document.getElementById('overlay-btn');

            oTitle.innerText = "🌟 Great Job! 🌟";
            oTitle.className = "kids-title text-3xl text-emerald-600 mb-2";
            
            if (currentStage < 3) {
                oMsg.innerText = `You completed Stage ${currentStage}! Ready to try Stage ${currentStage + 1}?`;
                oBtn.innerText = "Go to Next Stage!";
                oBtn.onclick = () => {
                    dismissOverlay();
                    setStage(currentStage + 1);
                };
            } else {
                oMsg.innerText = "Incredible! You have mastered the entire clef!";
                oBtn.innerText = "Play Again!";
                oBtn.onclick = () => {
                    dismissOverlay();
                    resetGame();
                };
            }

            overlay.classList.remove('hidden');
        }

        // GameOver state
        function triggerGameOver() {
            const overlay = document.getElementById('overlay');
            const oTitle = document.getElementById('overlay-title');
            const oMsg = document.getElementById('overlay-msg');
            const oBtn = document.getElementById('overlay-btn');

            oTitle.innerText = "No More Hearts!";
            oTitle.className = "kids-title text-3xl text-rose-500 mb-2";
            oMsg.innerText = "Let's restart the stage together and try again!";
            oBtn.innerText = "Restart Stage";
            
            oBtn.onclick = () => {
                dismissOverlay();
                lives = 3;
                streak = 0;
                updateHearts();
                newRound();
            };

            overlay.classList.remove('hidden');
        }

        function dismissOverlay() {
            const overlay = document.getElementById('overlay');
            overlay.classList.add('hidden');
        }

        // Reset all score properties
        function resetGame() {
            score = 0;
            streak = 0;
            lives = 3;
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;
            updateHearts();
            setStage(1);
        }

        // Hint System Toggle
        function toggleHints() {
            hintsEnabled = !hintsEnabled;
            const btnText = document.getElementById('hint-btn-text');
            if (hintsEnabled) {
                btnText.innerText = "Turn Hints Off";
            } else {
                btnText.innerText = "Turn Hints On";
            }
            drawStave();
        }

        // Fire on system startup
        window.onload = init;
    </script>
</body>
</html>
