<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counselling Booking App</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --card: #ffffff;
        --accent: #6c63ff;
        --accent-dark: #5148cc;
        --text: #1f2937;
        --muted: #6b7280;
        --available: #eefbf3;
        --booked: #ffe7e7;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }
      .hero {
        background: linear-gradient(135deg, var(--accent), #8f7cff);
        color: white;
        padding: 24px;
        border-radius: 16px;
        margin-bottom: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.06);
      }
      .calendar-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
      }
      .day-name {
        text-align: center;
        font-size: 0.85rem;
        color: var(--muted);
        font-weight: 600;
      }
      .day-cell {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        min-height: 110px;
        padding: 8px;
        background: #fcfcfd;
      }
      .day-cell.disabled {
        opacity: 0.45;
      }
      .day-number {
        font-weight: 700;
        margin-bottom: 6px;
      }
      .slot {
        display: block;
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 6px;
        margin-bottom: 6px;
        font-size: 0.8rem;
        cursor: pointer;
      }
      .slot.available { background: var(--available); color: #137a2c; }
      .slot.booked { background: var(--booked); color: #b42318; cursor: not-allowed; }
      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      input, textarea, select {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 1rem;
      }
      button {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover { background: var(--accent-dark); }
      .summary { margin-top: 14px; color: var(--muted); }
      .small { font-size: 0.9rem; color: var(--muted); }
      @media (max-width: 800px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1>Personal Counselling Booking</h1>
        <p>Choose an available one-hour slot and reserve your session.</p>
      </section>

      <div class="grid">
        <section class="card">
          <div class="calendar-nav">
            <button id="prevMonth">← Previous</button>
            <h2 id="monthLabel">Month</h2>
            <button id="nextMonth">Next →</button>
          </div>
          <div class="days" id="dayLabels"></div>
          <div class="days" id="calendarGrid"></div>
        </section>

        <section class="card">
          <h3 id="selectedTitle">Book a session</h3>
          <p class="small" id="selectedInfo">Select a slot to begin.</p>
          <form id="bookingForm">
            <input id="name" placeholder="Your name" required />
            <input id="email" type="email" placeholder="Your email" required />
            <textarea id="notes" rows="4" placeholder="What would you like to discuss?"></textarea>
            <button type="submit">Reserve Booking</button>
          </form>
          <div class="summary" id="bookingSummary"></div>
        </section>
      </div>
    </div>

    <script>
      const storageKey = 'counselling-bookings';
      const bookings = JSON.parse(localStorage.getItem(storageKey) || '[]');
      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      let currentDate = new Date();
      let selectedSlot = null;

      function saveBookings() {
        localStorage.setItem(storageKey, JSON.stringify(bookings));
      }

      function formatDateKey(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
      }

      function isBooked(dateKey, hour) {
        return bookings.some((b) => b.dateKey === dateKey && b.hour === hour);
      }

      function getMonthDays() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const days = [];
        const leading = firstDay.getDay();
        const total = lastDay.getDate();

        for (let i = 0; i < leading; i += 1) {
          days.push(null);
        }
        for (let i = 1; i <= total; i += 1) {
          days.push(new Date(year, month, i));
        }
        while (days.length % 7 !== 0) {
          days.push(null);
        }
        return days;
      }

      function renderCalendar() {
        document.getElementById('monthLabel').textContent = currentDate.toLocaleString('en', { month: 'long', year: 'numeric' });
        const labels = document.getElementById('dayLabels');
        labels.innerHTML = '';
        dayNames.forEach((name) => {
          const el = document.createElement('div');
          el.className = 'day-name';
          el.textContent = name;
          labels.appendChild(el);
        });

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const days = getMonthDays();
        const today = new Date();

        days.forEach((day) => {
          const cell = document.createElement('div');
          cell.className = 'day-cell';
          if (!day) {
            cell.classList.add('disabled');
            grid.appendChild(cell);
            return;
          }

          const dateKey = formatDateKey(day);
          const isPast = day < new Date(today.getFullYear(), today.getMonth(), today.getDate());
          cell.innerHTML = `<div class="day-number">${day.getDate()}</div>`;

          [9, 10, 11, 12, 13, 14, 15, 16].forEach((hour) => {
            const button = document.createElement('button');
            button.className = `slot ${isBooked(dateKey, hour) ? 'booked' : 'available'}`;
            button.textContent = `${hour}:00`;
            button.disabled = isBooked(dateKey, hour) || isPast;
            button.addEventListener('click', () => {
              selectSlot(dateKey, hour);
            });
            cell.appendChild(button);
          });

          grid.appendChild(cell);
        });
      }

      function selectSlot(dateKey, hour) {
        selectedSlot = { dateKey, hour };
        document.getElementById('selectedTitle').textContent = `Booking for ${dateKey} at ${hour}:00`;
        document.getElementById('selectedInfo').textContent = 'Fill in your details to confirm this session.';
        document.getElementById('bookingSummary').textContent = `Selected slot: ${dateKey} ${hour}:00`;
      }

      document.getElementById('prevMonth').addEventListener('click', () => {
        currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
        renderCalendar();
      });

      document.getElementById('nextMonth').addEventListener('click', () => {
        currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
        renderCalendar();
      });

      document.getElementById('bookingForm').addEventListener('submit', (event) => {
        event.preventDefault();
        if (!selectedSlot) {
          document.getElementById('bookingSummary').textContent = 'Please choose a slot first.';
          return;
        }

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const notes = document.getElementById('notes').value.trim();

        bookings.push({ ...selectedSlot, name, email, notes });
        saveBookings();
        renderCalendar();
        document.getElementById('bookingForm').reset();
        document.getElementById('bookingSummary').textContent = `Booked ${selectedSlot.dateKey} at ${selectedSlot.hour}:00 for ${name}.`;
        selectedSlot = null;
      });

      renderCalendar();
    </script>
  </body>
</html>
