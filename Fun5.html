<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Playground</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(to bottom, #bfe0c9, #e8f3d8);
    font-family: 'Trebuchet MS', 'Comic Sans MS', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 10px 60px;
    color: #2f3a24;
  }

  h1 { margin: 6px 0 2px; font-size: 2rem; text-align: center; }

  #soundNote { font-size: 0.8rem; color: #57684a; margin-top: -2px; margin-bottom: 6px; }

  /* --- Dino selector tabs --- */
  #dinoTabs {
    display: flex;
    gap: 10px;
    margin: 10px 0 4px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .dino-tab {
    font-family: inherit;
    font-size: 1rem;
    padding: 10px 16px;
    border-radius: 30px;
    border: 2px solid #7a9a5a;
    background: white;
    color: #3d4d2c;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .dino-tab.active {
    background: #7a9a5a;
    color: white;
  }

  #nameLabel {
    font-size: 1.1rem;
    margin-bottom: 6px;
    color: #3d4d2c;
  }

  /* --- Habitat / stage --- */
  #habitat {
    position: relative;
    width: 360px;
    height: 300px;
    margin-top: 6px;
    background: linear-gradient(to bottom, #cdeadd 0%, #cdeadd 70%, #b8935c 70%, #b8935c 100%);
    border-radius: 24px;
    border: 8px solid #6f8c4f;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
  }

  .plant {
    position: absolute;
    bottom: 88px;
    font-size: 34px;
    opacity: 0.9;
  }
  #volcano {
    position: absolute;
    top: 10px;
    right: 18px;
    font-size: 30px;
    opacity: 0.55;
  }

  .dino-svg {
    position: absolute;
    left: 50%;
    bottom: 92px;
    transform: translateX(-50%);
    width: 220px;
    height: auto;
    cursor: pointer;
    display: none;
    transition: transform 0.15s ease;
  }
  .dino-svg.active { display: block; }
  .dino-svg:active { transform: translateX(-50%) scale(0.97); }

  .poke { animation: wiggle 0.4s ease; }
  @keyframes wiggle {
    0%,100% { transform: translateX(-50%) rotate(0deg); }
    25% { transform: translateX(-50%) rotate(-3deg); }
    75% { transform: translateX(-50%) rotate(3deg); }
  }

  .stomp { animation: stompAnim 0.4s ease 2; }
  @keyframes stompAnim {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px) scaleY(0.96); }
  }

  #habitat.shake { animation: habitatShake 0.4s ease 2; }
  @keyframes habitatShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .roar { animation: roarAnim 0.5s ease; }
  @keyframes roarAnim {
    0%,100% { transform: translateX(-50%) rotate(0deg); }
    30% { transform: translateX(-50%) rotate(-2deg) translateY(-4px); }
    60% { transform: translateX(-50%) rotate(2deg) translateY(0); }
  }

  [class*="mouthGroup"] {
    transform-box: fill-box;
    transform-origin: center;
  }
  .roaring [class*="mouthGroup"] { animation: jawOpen 0.5s ease; }
  @keyframes jawOpen {
    0%,100% { transform: scaleY(1); }
    40% { transform: scaleY(2.6); }
  }

  .munching [class*="mouthGroup"] { animation: chew 0.25s ease-in-out 4; }
  @keyframes chew {
    0%,100% { transform: scaleY(1); }
    50% { transform: scaleY(2); }
  }

  .heart {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    opacity: 0.95;
    animation: floatUp 1.4s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.6); opacity: 1; }
    100% { transform: translateY(-90px) scale(1.3); opacity: 0; }
  }

  .food-item {
    position: absolute;
    font-size: 26px;
    top: 6px;
    transform: translate(-50%, 0);
    transition: top 0.55s ease-in, left 0.55s ease-in, opacity 0.2s ease 0.5s;
  }

  /* --- Controls --- */
  #controls {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 420px;
  }

  .row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }

  button {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    color: white;
    box-shadow: 0 3px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s ease;
  }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }

  .food-btn { background: #c97b3d; }
  .food-btn:hover { background: #b5692e; }

  .sound-btn { background: #4f8f6e; }
  .sound-btn:hover { background: #417a5c; }

  .action-btn { background: #5a8bd8; }
  .action-btn:hover { background: #4676c2; }

  .fact-btn { background: #b07bc7; }
  .fact-btn:hover { background: #9c62b4; }

  #colorRow { display: flex; align-items: center; gap: 8px; }

  #excitementWrap { width: 260px; text-align: center; }

  #excitementBar {
    width: 100%;
    height: 16px;
    background: #dcead0;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #6f8c4f;
  }

  #excitementFill {
    height: 100%;
    width: 15%;
    background: linear-gradient(to right, #7ecb6f, #f2c14e);
    transition: width 0.4s ease;
  }

  #factBox {
    max-width: 380px;
    min-height: 50px;
    text-align: center;
    background: white;
    border-radius: 14px;
    padding: 12px 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    font-size: 0.95rem;
  }
</style>
</head>

<script>
/* ---------- Dino configuration ---------- */
const dinoData = {
  trex: {
    label: 'the Tyrannosaurus rex',
    svgId: 'dinoTrex',
    skinId: 'skinTrex',
    defaultColor: '#5f7a4a',
    diet: 'meat',

    label: 'the Triceratops',
    svgId: 'dinoTri',

    defaultColor: '#7a8c9a',
    diet: 'plants',

    feedLabel: 'Feed 🌿',
    roarPitch: 'mid',
    facts: [
      "Triceratops had three horns on its face and a huge bony frill at the back of its skull.",
      "It was a herbivore, using its sharp beak to snip tough plants like ferns and cycads.",
      "A full-grown Triceratops could weigh as much as an elephant, around 6 to 12 tonnes.",
      "Its frill may have been used for display, to attract mates, or to look intimidating to predators.",
      "Triceratops lived alongside T. rex, right at the end of the age of dinosaurs."
    ]
  },
  stego: {
    label: 'the Stegosaurus',
    svgId: 'dinoStego',
    skinId: 'skinStego',
    defaultColor: '#8a6b4a',
    diet: 'plants',
    foodEmoji: '🌿',
    feedLabel: 'Feed 🌿',
    roarPitch: 'mid-low',
    facts: [
      "Stegosaurus had large bony plates along its back, arranged in two rows.",
      "Its tail ended in four sharp spikes, nicknamed the 'thagomizer'.",
      "Despite its huge body, Stegosaurus had a brain roughly the size of a walnut.",
      "It walked on all fours with much longer back legs than front legs.",
      "Stegosaurus lived around 150 million years ago, in the late Jurassic period."
    ]
  }
};

let currentDino = 'trex';
let excitement = { trex: 15, tri: 15, stego: 15 };
const dinoColors = {
  trex: dinoData.trex.defaultColor,
  tri: dinoData.tri.defaultColor,
  stego: dinoData.stego.defaultColor
};

const habitat = document.getElementById('habitat');
const excitementFill = document.getElementById('excitementFill');
const factBox = document.getElementById('factBox');
const nameDisplay = document.getElementById('nameDisplay');
const colorPicker = document.getElementById('colorPicker');
const feedBtn = document.getElementById('feedBtn');

function setExcitement(v) {
  excitement[currentDino] = Math.max(0, Math.min(100, v));
  excitementFill.style.width = excitement[currentDino] + '%';
}

function bumpExcitement(amount) {
  setExcitement(excitement[currentDino] + amount);
}

function activeSvg() {
  return document.getElementById(dinoData[currentDino].svgId);
}

function switchDino(key) {
  currentDino = key;
  document.querySelectorAll('.dino-svg').forEach(s => s.classList.remove('active'));
  activeSvg().classList.add('active');
  document.querySelectorAll('.dino-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.dino === key);
  });
  nameDisplay.textContent = dinoData[key].label;
  colorPicker.value = dinoColors[key];
  feedBtn.textContent = dinoData[key].feedLabel;
  excitementFill.style.width = excitement[key] + '%';
  factBox.textContent = 'Tap "Random Fact" to learn something about ' + dinoData[key].label.replace('the ', '') + '!';
}

document.querySelectorAll('.dino-tab').forEach(tab => {
  tab.addEventListener('click', () => switchDino(tab.dataset.dino));
});

colorPicker.addEventListener('input', (e) => {
  dinoColors[currentDino] = e.target.value;
  document.getElementById(dinoData[currentDino].skinId).setAttribute('fill', e.target.value);
});

/* ---------- Audio (all synthesized, no external files) ---------- */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tone(freqStart, freqEnd, start, dur, type, peakGain) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  osc.type = type;
  osc.frequency.setValueAtTime(freqStart, start);
  osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 1), start + dur);
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.linearRampToValueAtTime(peakGain, start + dur * 0.2);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  osc.connect(gain).connect(ac.destination);
  osc.start(start);
  osc.stop(start + dur + 0.02);
}

function noiseBurst(start, dur, filterFreq, filterType, peakGain) {
  const ac = getAudioCtx();
  const bufferSize = Math.floor(ac.sampleRate * dur);
  const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  const noise = ac.createBufferSource();
  noise.buffer = buffer;
  const filter = ac.createBiquadFilter();
  filter.type = filterType;
  filter.frequency.value = filterFreq;
  const gain = ac.createGain();
  gain.gain.setValueAtTime(peakGain, start);
  gain.gain.exponentialRampToValueAtTime(0.001, start + dur);
  noise.connect(filter).connect(gain).connect(ac.destination);
  noise.start(start);
  noise.stop(start + dur);
}

function playRoar() {
  const ac = getAudioCtx();
  const now = ac.currentTime;
  const pitch = dinoData[currentDino].roarPitch;
  if (pitch === 'low') {
    // T. rex: deep, aggressive, guttural roar
    tone(90, 55, now, 0.9, 'sawtooth', 0.28);
    tone(180, 100, now, 0.9, 'sawtooth', 0.12);
    noiseBurst(now, 0.9, 400, 'lowpass', 0.18);
    tone(70, 40, now + 0.75, 0.4, 'sawtooth', 0.2);
  } else if (pitch === 'mid') {
    // Triceratops: shorter, nasal bellow
    tone(150, 90, now, 0.55, 'sawtooth', 0.22);
    noiseBurst(now, 0.55, 600, 'bandpass', 0.14);
    tone(140, 85, now + 0.5, 0.3, 'sawtooth', 0.16);
  } else {
    // Stegosaurus: low grumbling snort
    tone(110, 75, now, 0.5, 'triangle', 0.2);
    noiseBurst(now, 0.5, 350, 'lowpass', 0.15);
  }
}

function playStomp() {
  const ac = getAudioCtx();
  const now = ac.currentTime;
  tone(90, 40, now, 0.25, 'sine', 0.3);
  noiseBurst(now, 0.2, 200, 'lowpass', 0.22);
  tone(90, 40, now + 0.3, 0.25, 'sine', 0.26);
  noiseBurst(now + 0.3, 0.2, 200, 'lowpass', 0.2);
}

function playChomp() {
  const ac = getAudioCtx();
  const now = ac.currentTime;
  const diet = dinoData[currentDino].diet;
  for (let i = 0; i < 3; i++) {
    const start = now + i * 0.2;
    if (diet === 'meat') {
      noiseBurst(start, 0.12, 900, 'bandpass', 0.3);
      tone(400, 150, start, 0.08, 'square', 0.1);
    } else {
      noiseBurst(start, 0.1, 1400, 'highpass', 0.22);
    }
  }
}

/* ---------- Interactions ---------- */
function spawnHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.textContent = '💚';
  heart.style.left = (40 + Math.random() * 40) + '%';
  heart.style.bottom = '140px';
  habitat.appendChild(heart);
  setTimeout(() => heart.remove(), 1400);
}

function withDinoClass(cls, duration) {
  const svg = activeSvg();
  svg.classList.remove(cls);
  void svg.offsetWidth;
  svg.classList.add(cls);
  setTimeout(() => svg.classList.remove(cls), duration);
}

document.querySelectorAll('.dino-svg').forEach(svg => {
  svg.addEventListener('click', () => {
    getAudioCtx();
    withDinoClass('poke', 400);
    withDinoClass('roaring', 500);
    playRoar();
    spawnHeart();
    bumpExcitement(3);
  });
});

document.getElementById('roarBtn').addEventListener('click', () => {
  getAudioCtx();
  withDinoClass('roar', 500);
  withDinoClass('roaring', 500);
  playRoar();
  bumpExcitement(4);
});

document.getElementById('stompBtn').addEventListener('click', () => {
  getAudioCtx();
  withDinoClass('stomp', 800);
  habitat.classList.remove('shake');
  void habitat.offsetWidth;
  habitat.classList.add('shake');
  setTimeout(() => habitat.classList.remove('shake'), 800);
  playStomp();
  bumpExcitement(3);
});

feedBtn.addEventListener('click', () => {
  getAudioCtx();
  const emoji = dinoData[currentDino].foodEmoji;
  const food = document.createElement('div');
  food.className = 'food-item';
  food.textContent = emoji;
  const svg = activeSvg();
  const svgRect = svg.getBoundingClientRect();
  const habitatRect = habitat.getBoundingClientRect();
  const targetLeft = (svgRect.left + svgRect.width * 0.12) - habitatRect.left;
  food.style.left = (30 + Math.random() * 260) + 'px';
  habitat.appendChild(food);
  requestAnimationFrame(() => {
    food.style.top = '190px';
    food.style.left = targetLeft + 'px';
  });
  setTimeout(() => {
    food.style.opacity = '0';
    withDinoClass('munching', 1100);
    playChomp();
    spawnHeart();
    bumpExcitement(6);
    setTimeout(() => food.remove(), 700);
  }, 560);
});

document.getElementById('factBtn').addEventListener('click', () => {
  const facts = dinoData[currentDino].facts;
  factBox.textContent = facts[Math.floor(Math.random() * facts.length)];
});
</script>
