<!DOCTYPE html>
<html lang="en">
<head>
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Guinea Pig Playground</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(to bottom, #fdf3e0, #f7e4c8);
    font-family: 'Trebuchet MS', 'Comic Sans MS', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 10px 60px;
    color: #4a3728;
  }

  h1 {
    margin: 6px 0 2px;
    font-size: 2rem;
    text-align: center;
  }

  #nameLabel {
    font-size: 1.1rem;
    margin-bottom: 10px;
    color: #7a5a3a;
  }

  #nameInput {
    font-family: inherit;
    font-size: 1rem;
    padding: 6px 10px;
    border-radius: 20px;
    border: 2px solid #d8b98a;
    outline: none;
    text-align: center;
    width: 160px;
  }

  /* --- Cage / stage --- */
  #cage {
    position: relative;
    width: 340px;
    height: 300px;
    margin-top: 14px;
    background: #e9d3a3;
    border-radius: 24px;
    border: 8px solid #c79a5a;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
  }

  #bedding {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: repeating-linear-gradient(45deg, #f3e0b5, #f3e0b5 8px, #ead29c 8px, #ead29c 16px);
  }

  #pig {
    position: absolute;
    left: 50%;
    bottom: 45px;
    transform: translateX(-50%);
    width: 190px;
    height: auto;
    cursor: pointer;
    transition: transform 0.15s ease;
  }

  #pig:active { transform: translateX(-50%) scale(0.97); }

  .wiggle { animation: wiggle 0.4s ease; }
  @keyframes wiggle {
    0%,100% { transform: translateX(-50%) rotate(0deg); }
    25% { transform: translateX(-50%) rotate(-4deg); }
    75% { transform: translateX(-50%) rotate(4deg); }
  }

  .popcorn { animation: popcorn 0.5s ease 3; }
  @keyframes popcorn {
    0%   { transform: translateX(-50%) translateY(0) scaleY(1); }
    35%  { transform: translateX(-50%) translateY(-55px) scaleY(1.08); }
    55%  { transform: translateX(-50%) translateY(-55px) scaleY(0.95); }
    100% { transform: translateX(-50%) translateY(0) scaleY(1); }
  }

  .munch #mouthGroup {
    transform-box: fill-box;
    transform-origin: center;
    animation: chew 0.25s ease-in-out 4;
  }
  @keyframes chew {
    0%,100% { transform: scaleY(1); }
    50% { transform: scaleY(2.2); }
  }

  .content #eyeLGroup, .content #eyeRGroup {
    transform-box: fill-box;
    transform-origin: center;
    animation: blinkClosed 1.4s ease forwards;
  }
  @keyframes blinkClosed {
    0% { transform: scaleY(1); }
    100% { transform: scaleY(0.15); }
  }

  .heart {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    opacity: 0.95;
    animation: floatUp 1.4s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) scale(0.6); opacity: 1; }
    100% { transform: translateY(-90px) scale(1.3); opacity: 0; }
  }

  .food-item {
    position: absolute;
    font-size: 26px;
    top: 6px;
    transform: translate(-50%, 0);
    transition: top 0.55s ease-in, left 0.55s ease-in, opacity 0.2s ease 0.5s;
  }

  /* --- Controls --- */
  #controls {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 420px;
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  button {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 10px 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    color: white;
    box-shadow: 0 3px 0 rgba(0,0,0,0.2);
    transition: transform 0.1s ease;
  }
  button:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }

  .food-btn { background: #ef9d3a; }
  .food-btn:hover { background: #e78c1e; }

  .sound-btn { background: #5a9bd8; }
  .sound-btn:hover { background: #4589c9; }

  .action-btn { background: #6fb26a; }
  .action-btn:hover { background: #5aa055; }

  .fact-btn { background: #b07bc7; }
  .fact-btn:hover { background: #9c62b4; }

  #colorRow {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #happinessWrap {
    width: 260px;
    text-align: center;
  }

  #happinessBar {
    width: 100%;
    height: 16px;
    background: #ecdcbb;
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid #c79a5a;
  }

  #happinessFill {
    height: 100%;
    width: 15%;
    background: linear-gradient(to right, #ffb347, #ff6f91);
    transition: width 0.4s ease;
  }

  #factBox {
    max-width: 380px;
    min-height: 50px;
    text-align: center;
    background: white;
    border-radius: 14px;
    padding: 12px 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    font-size: 0.95rem;
  }

  #soundNote {
    font-size: 0.8rem;
    color: #8a7154;
    margin-top: -4px;
  }
</style>
</head>
<body>

<h1>🐹 Guinea Pig Playground</h1>
<div id="nameLabel">
  <span id="nameDisplay">Peanut</span> is waiting to play —
  <input id="nameInput" type="text" placeholder="rename me" maxlength="16">
</div>
<div id="soundNote">Turn your sound on — click Peanut or a button to wake up audio</div>

<div id="cage">
  <div id="bedding"></div>
  <svg id="pig" viewBox="-20 0 280 190">
    <defs>
      <radialGradient id="furShade" cx="35%" cy="30%" r="75%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
        <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="100%" stop-color="#000000" stop-opacity="0.16"/>
      </radialGradient>
    </defs>

    <!-- rear paw peeking out -->
    <ellipse cx="205" cy="172" rx="15" ry="7" fill="#8a5f34"/>
    <!-- front paw peeking out -->
    <ellipse cx="35" cy="168" rx="13" ry="6.5" fill="#8a5f34"/>

    <!-- main body: a compact "loaf" shape, no visible neck -->
    <path id="body"
      d="M18,150
         C -6,128 -10,88 14,60
         C 36,32 82,14 135,13
         C 190,12 232,32 246,68
         C 258,96 252,132 226,155
         C 198,176 160,180 122,180
         C 84,180 42,175 18,150 Z"
      fill="#c68a4b"/>

    <!-- cream/white patch typical of many guinea pig breeds -->
    <path d="M150,40 C190,35 225,55 232,90 C238,118 222,148 195,160
             C205,130 202,95 185,68 C175,52 162,44 150,40 Z"
      fill="#f2e6cf" opacity="0.9"/>

    <!-- fur shading overlay for a touch of dimension -->
    <path d="M18,150 C -6,128 -10,88 14,60 C 36,32 82,14 135,13
             C 190,12 232,32 246,68 C 258,96 252,132 226,155
             C 198,176 160,180 122,180 C 84,180 42,175 18,150 Z"
      fill="url(#furShade)"/>

    <!-- short fur texture strokes -->
    <g stroke="#5a3a22" stroke-width="1" opacity="0.12" stroke-linecap="round">
      <path d="M60,30 q6,10 2,20" fill="none"/>
      <path d="M85,20 q6,11 1,22" fill="none"/>
      <path d="M110,16 q5,12 0,23" fill="none"/>
      <path d="M140,15 q4,12 -1,23" fill="none"/>
      <path d="M170,20 q4,12 -2,22" fill="none"/>
      <path d="M195,32 q2,12 -5,20" fill="none"/>
      <path d="M40,90 q10,4 18,0" fill="none"/>
      <path d="M60,130 q10,5 19,1" fill="none"/>
      <path d="M120,160 q12,4 22,0" fill="none"/>
      <path d="M180,140 q11,5 20,-1" fill="none"/>
    </g>

    <!-- snout, slightly narrower and blunt -->
    <path id="snout"
      d="M14,60 C -10,54 -26,66 -27,86 C -28,104 -14,116 6,112
         C -2,96 -2,76 14,60 Z"
      fill="#c68a4b"/>
    <path d="M14,60 C -10,54 -26,66 -27,86 C -28,104 -14,116 6,112 C -2,96 -2,76 14,60 Z"
      fill="url(#furShade)"/>

    <!-- ear (far side, behind head, muted) -->
    <ellipse cx="95" cy="18" rx="11" ry="15" fill="#a3703d" opacity="0.9" transform="rotate(-12 95 18)"/>
    <ellipse cx="95" cy="20" rx="6" ry="9" fill="#7a5228" opacity="0.9" transform="rotate(-12 95 20)"/>

    <!-- ear (near side) -->
    <ellipse cx="63" cy="16" rx="12" ry="16" fill="#a3703d" transform="rotate(-18 63 16)"/>
    <ellipse cx="63" cy="18" rx="6.5" ry="10" fill="#d9a878" opacity="0.85" transform="rotate(-18 63 18)"/>

    <!-- eye: small, dark, correctly proportioned for the side of the head -->
    <g id="eyeLGroup">
      <ellipse cx="34" cy="70" rx="6.5" ry="7" fill="#241609"/>
      <ellipse cx="34" cy="70" rx="6.5" ry="7" fill="none" stroke="#0d0803" stroke-width="0.6"/>
      <circle cx="31.5" cy="67" r="1.4" fill="#f4ede0" opacity="0.85"/>
    </g>
    <path d="M26,63 Q34,58 42,63" stroke="#5a3a22" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- nose leather at snout tip -->
    <ellipse cx="-22" cy="82" rx="6" ry="4.5" fill="#8a5a52"/>
    <ellipse cx="-24" cy="80" rx="1.3" ry="1" fill="#3a2018"/>
    <ellipse cx="-20" cy="84" rx="1.3" ry="1" fill="#3a2018"/>

    <!-- mouth: small, closed, realistic -->
    <g id="mouthGroup">
      <path d="M-19,90 Q-14,96 -6,92" stroke="#4a2f1c" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    </g>

    <!-- whiskers -->
    <g stroke="#e8dcc8" stroke-width="1" opacity="0.8">
      <line x1="-20" y1="78" x2="-58" y2="66"/>
      <line x1="-20" y1="86" x2="-60" y2="86"/>
      <line x1="-20" y1="94" x2="-56" y2="104"/>
      <line x1="-15" y1="76" x2="-40" y2="58"/>
    </g>
  </svg>
</div>

<div id="controls">
  <div id="happinessWrap">
    <div>Happiness</div>
    <div id="happinessBar"><div id="happinessFill"></div></div>
  </div>

  <div class="row">
    <button class="food-btn" data-food="🥕">Feed Carrot</button>
    <button class="food-btn" data-food="🥬">Feed Lettuce</button>
    <button class="food-btn" data-food="🌿">Feed Hay</button>
  </div>

  <div class="row">
    <button class="sound-btn" id="wheekBtn">Wheek!</button>
    <button class="sound-btn" id="purrBtn">Purr</button>
    <button class="sound-btn" id="chirpBtn">Rare Chirp</button>
  </div>

  <div class="row">
    <button class="action-btn" id="popcornBtn">Popcorn Jump</button>
    <button class="fact-btn" id="factBtn">Random Fact</button>
  </div>

  <div id="colorRow">
    <label for="colorPicker">Fur colour:</label>
    <input type="color" id="colorPicker" value="#c68a4b">
  </div>

  <div id="factBox">Click "Random Fact" to learn something about guinea pigs!</div>
</div>

<script>
/* ---------- Elements ---------- */
const pig = document.getElementById('pig');
const cage = document.getElementById('cage');
const body = document.getElementById('body');
const snout = document.getElementById('snout');
const happinessFill = document.getElementById('happinessFill');
const factBox = document.getElementById('factBox');
const nameInput = document.getElementById('nameInput');
const nameDisplay = document.getElementById('nameDisplay');

let happiness = 15;
function setHappiness(v) {
  happiness = Math.max(0, Math.min(100, v));
  happinessFill.style.width = happiness + '%';
}
setHappiness(happiness);

nameInput.addEventListener('input', () => {
  nameDisplay.textContent = nameInput.value.trim() || 'Peanut';
});

document.getElementById('colorPicker').addEventListener('input', (e) => {
  body.setAttribute('fill', e.target.value);
  snout.setAttribute('fill', e.target.value);
});

/* ---------- Audio (all synthesized, no external files) ---------- */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tone(freqStart, freqEnd, start, dur, type, peakGain) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  osc.type = type;
  osc.frequency.setValueAtTime(freqStart, start);
  osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 1), start + dur);
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.0001, start);
  gain.gain.linearRampToValueAtTime(peakGain, start + dur * 0.25);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  osc.connect(gain).connect(ac.destination);
  osc.start(start);
  osc.stop(start + dur + 0.02);
}

function playWheek() {
  const ac = getAudioCtx();
  const now = ac.currentTime;
  // guinea pigs "wheek" - a loud rising excited squeal, often repeated
  tone(700, 2200, now, 0.16, 'sawtooth', 0.22);
  tone(650, 2400, now + 0.22, 0.18, 'sawtooth', 0.22);
  tone(800, 2100, now + 0.46, 0.14, 'sawtooth', 0.18);
}

function playPurr() {
  const ac = getAudioCtx();
  const now = ac.currentTime;
  const osc = ac.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(75, now);
  const lfo = ac.createOscillator();
  lfo.frequency.setValueAtTime(14, now);
  const lfoGain = ac.createGain();
  lfoGain.gain.setValueAtTime(0.08, now);
  lfo.connect(lfoGain);
  const mainGain = ac.createGain();
  mainGain.gain.setValueAtTime(0.0001, now);
  mainGain.gain.linearRampToValueAtTime(0.15, now + 0.2);
  mainGain.gain.setValueAtTime(0.15, now + 1.2);
  mainGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.6);
  lfoGain.connect(mainGain.gain);
  osc.connect(mainGain).connect(ac.destination);
  osc.start(now);
  lfo.start(now);
  osc.stop(now + 1.65);
  lfo.stop(now + 1.65);
}

function playChirp() {
  const ac = getAudioCtx();
  const now = ac.currentTime;
  // the rare bird-like "chirping" some guinea pigs do
  const notes = [1800, 2200, 1600, 2400];
  notes.forEach((f, i) => {
    tone(f, f * 0.9, now + i * 0.28, 0.12, 'sine', 0.12);
  });
}

function playMunch() {
  const ac = getAudioCtx();
  const now = ac.currentTime;
  for (let i = 0; i < 3; i++) {
    const start = now + i * 0.18;
    const bufferSize = Math.floor(ac.sampleRate * 0.08);
    const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
    const data = buffer.getChannelData(0);
    for (let j = 0; j < bufferSize; j++) {
      data[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / bufferSize, 3);
    }
    const noise = ac.createBufferSource();
    noise.buffer = buffer;
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 700;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.35, start);
    gain.gain.exponentialRampToValueAtTime(0.001, start + 0.08);
    noise.connect(filter).connect(gain).connect(ac.destination);
    noise.start(start);
    noise.stop(start + 0.08);
  }
}

function playPopcornSqueak() {
  const ac = getAudioCtx();
  const now = ac.currentTime;
  tone(900, 1700, now, 0.09, 'square', 0.14);
  tone(1000, 500, now + 0.12, 0.09, 'square', 0.12);
}

/* ---------- Interactions ---------- */
function bumpHappiness(amount) {
  setHappiness(happiness + amount);
}

function spawnHeart() {
  const heart = document.createElement('div');
  heart.className = 'heart';
  heart.textContent = '💕';
  heart.style.left = (40 + Math.random() * 40) + '%';
  heart.style.bottom = '90px';
  cage.appendChild(heart);
  setTimeout(() => heart.remove(), 1400);
}

pig.addEventListener('click', () => {
  getAudioCtx();
  pig.classList.remove('wiggle');
  void pig.offsetWidth;
  pig.classList.add('wiggle');
  playWheek();
  spawnHeart();
  bumpHappiness(4);
});

document.querySelectorAll('.food-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    getAudioCtx();
    const emoji = btn.dataset.food;
    const food = document.createElement('div');
    food.className = 'food-item';
    food.textContent = emoji;
    const pigRect = pig.getBoundingClientRect();
    const cageRect = cage.getBoundingClientRect();
    const targetLeft = ((pigRect.left + pigRect.width * 0.15) - cageRect.left);
    food.style.left = (40 + Math.random() * 200) + 'px';
    cage.appendChild(food);
    requestAnimationFrame(() => {
      food.style.top = '210px';
      food.style.left = targetLeft + 'px';
    });
    setTimeout(() => {
      food.style.opacity = '0';
      pig.classList.add('munch');
      playMunch();
      spawnHeart();
      bumpHappiness(6);
      setTimeout(() => pig.classList.remove('munch'), 1100);
      setTimeout(() => food.remove(), 700);
    }, 560);
  });
});

document.getElementById('wheekBtn').addEventListener('click', () => {
  getAudioCtx();
  playWheek();
  pig.classList.remove('wiggle');
  void pig.offsetWidth;
  pig.classList.add('wiggle');
  bumpHappiness(2);
});

document.getElementById('purrBtn').addEventListener('click', () => {
  getAudioCtx();
  playPurr();
  pig.classList.add('content');
  bumpHappiness(3);
  setTimeout(() => pig.classList.remove('content'), 1600);
});

document.getElementById('chirpBtn').addEventListener('click', () => {
  getAudioCtx();
  playChirp();
  bumpHappiness(3);
});

document.getElementById('popcornBtn').addEventListener('click', () => {
  getAudioCtx();
  pig.classList.remove('popcorn');
  void pig.offsetWidth;
  pig.classList.add('popcorn');
  playPopcornSqueak();
  setTimeout(playPopcornSqueak, 500);
  setTimeout(playPopcornSqueak, 1000);
  spawnHeart();
  bumpHappiness(5);
  setTimeout(() => pig.classList.remove('popcorn'), 1600);
});

const facts = [
  "Guinea pigs are also called cavies, short for their scientific name Cavia porcellus.",
  "They squeal loudly, called 'wheeking', usually when they hear the fridge or a food bag rustle.",
  "Guinea pigs can't produce their own vitamin C and need it from their diet, just like humans.",
  "A happy, excited guinea pig will often jump straight up in the air — this is called 'popcorning'.",
  "Guinea pigs have 20 teeth, and their front teeth never stop growing.",
  "They originally come from the Andes region of South America.",
  "Guinea pigs are highly social and usually do best living with at least one companion.",
  "Their eyes are on the sides of their head, giving them a nearly 340-degree field of view.",
  "A group of guinea pigs is sometimes called a 'herd'.",
  "Guinea pigs can live 5 to 8 years, longer than many small pets.",
  "They purr for different reasons — it can mean contentment, or sometimes mild annoyance, depending on the pitch.",
  "Baby guinea pigs, called pups, are born fully furred with their eyes open."
];

document.getElementById('factBtn').addEventListener('click', () => {
  const f = facts[Math.floor(Math.random() * facts.length)];
  factBox.textContent = f;
});
</script>

</body>
</html>
