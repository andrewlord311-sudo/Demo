<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Hunt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #d1fae5 0%, #fef9c3 100%);
            min-height: 100vh;
        }
        .kids-title {
            font-family: 'Fredoka One', cursive;
            text-shadow: 3px 3px 0px #047857;
        }
        .mascot-bounce { animation: idle-bounce 2s ease-in-out infinite alternate; }
        @keyframes idle-bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }
        .mascot-spin { animation: happy-spin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1; }
        @keyframes happy-spin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.3); } 100% { transform: rotate(360deg) scale(1); } }
        .mascot-sad { animation: sad-shake 0.5s ease-in-out 1; }
        @keyframes sad-shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px) rotate(-5deg); } 40%, 80% { transform: translateX(10px) rotate(5deg); } }
        .confetti { position: absolute; pointer-events: none; width: 12px; height: 12px; border-radius: 50%; animation: blow-up 1s ease-out forwards; }
        @keyframes blow-up { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }

        .white-key {
            box-shadow: inset 0 -8px 0 #e2e8f0, 0 4px 6px rgba(0,0,0,0.05);
            transition: background-color 0.15s, transform 0.05s, box-shadow 0.05s;
        }
        .white-key.found {
            background-color: #86efac !important;
            box-shadow: inset 0 -8px 0 #16a34a, 0 4px 6px rgba(0,0,0,0.05);
        }
        .white-key.wrong-flash { background-color: #fca5a5 !important; }
        .black-key {
            box-shadow: inset 0 -6px 0 #000000, 0 3px 5px rgba(0,0,0,0.3);
            transition: background-color 0.1s, transform 0.05s, box-shadow 0.05s;
        }
        button { touch-action: manipulation; }
    </style>
</head>
<body class="py-2 px-4 flex items-center justify-center">

    <div id="game-card" class="max-w-xl w-full bg-white rounded-3xl shadow-2xl border-4 border-emerald-400 p-4 relative overflow-hidden">

        <div class="flex justify-between items-center mb-2">
            <div class="flex gap-2">
                <span class="bg-yellow-100 text-yellow-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    ⭐ Score: <span id="score">0</span>
                </span>
                <span class="bg-orange-100 text-orange-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    🔥 Streak: <span id="streak">0</span>
                </span>
            </div>
            <div class="flex items-center gap-1 text-2xl" id="hearts-container">❤️❤️❤️</div>
        </div>

        <h1 class="kids-title text-3xl text-emerald-600 text-center mb-1">C Hunt</h1>
        <p class="text-slate-500 text-center text-sm font-semibold mb-3">Find every C hiding on the keyboard!</p>

        <div class="grid grid-cols-3 gap-2 bg-emerald-50 p-2 rounded-2xl mb-2 border border-emerald-100">
            <button id="btn-stage-1" onclick="setStage(1)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-emerald-400 text-white border-b-2 border-emerald-600 shadow">
                ☀️ Stage 1: Easy
            </button>
            <button id="btn-stage-2" onclick="setStage(2)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🌴 Stage 2: Medium
            </button>
            <button id="btn-stage-3" onclick="setStage(3)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🚀 Stage 3: Hard
            </button>
        </div>

        <div class="flex items-center gap-3 bg-emerald-50 p-2 rounded-2xl border border-emerald-100 mb-2">
            <div id="mascot-avatar" class="mascot-bounce shrink-0 transition-transform"></div>
            <div class="relative bg-white border border-emerald-100 p-2 rounded-xl shadow-sm w-full">
                <div class="absolute top-1/2 -left-2 w-4 h-4 -translate-y-1/2 rotate-45 bg-white border-l border-b border-emerald-50"></div>
                <p id="mascot-dialog" class="text-slate-700 font-bold text-sm leading-snug">
                    Hi, I'm Melody! Tap every C you can find on the keyboard!
                </p>
            </div>
        </div>

        <div class="flex items-center justify-between mb-2">
            <div id="progress-text" class="font-bold text-slate-700 text-sm">Found 0 / 2 C's</div>
            <div id="timer-text" class="font-black text-rose-500 text-sm hidden">⏱️ 12s</div>
        </div>

        <div class="relative">
            <div id="piano-container" class="relative flex select-none bg-slate-800 p-2 rounded-2xl border-2 border-slate-300 h-32 w-full overflow-hidden">
            </div>
            <div id="confetti-holder" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
            <div id="overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-2xl flex flex-col justify-center items-center p-6 text-center hidden transition-opacity duration-300 z-50">
                <div id="overlay-mascot" class="mb-3 mascot-bounce"></div>
                <h3 id="overlay-title" class="kids-title text-3xl text-emerald-600 mb-2">Stage Passed!</h3>
                <p id="overlay-msg" class="text-slate-600 font-bold mb-4">Incredible job!</p>
                <button id="overlay-btn" onclick="dismissOverlay()" class="bg-yellow-400 text-slate-800 font-extrabold px-8 py-3 rounded-full border-b-4 border-yellow-600 hover:brightness-105 active:scale-95 transition-all text-lg">
                    Next Challenge!
                </button>
            </div>
        </div>

        <div id="feedback" class="text-center text-lg font-bold min-h-[28px] text-slate-700 my-3">
            Tap a C to begin!
        </div>

        <div class="flex justify-between items-center text-xs">
            <button onclick="toggleHints()" class="bg-purple-100 text-purple-700 border-b-2 border-purple-300 font-bold px-4 py-2 rounded-xl hover:bg-purple-200">
                💡 <span id="hint-btn-text">Turn Hints On</span>
            </button>
            <button onclick="resetGame()" class="bg-rose-100 text-rose-700 border-b-2 border-rose-300 font-bold px-4 py-2 rounded-xl hover:bg-rose-200">
                🔄 Reset Score
            </button>
        </div>

    </div>

    <script>
        let currentStage = 1;
        let score = 0;
        let streak = 0;
        let lives = 3;
        let hintsEnabled = false;
        let controlLock = false;
        let foundSet = new Set();
        let totalCs = 0;
        let timerInterval = null;
        let timeLeft = 0;

        const START_OCTAVE = 3;
        let allKeys = [];
        function buildKeys() {
            allKeys = [];
            const whiteNotes = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'A', 'B', 'C'];
            for (let i = 0; i < 15; i++) {
                const noteName = whiteNotes[i];
                const octaveOffset = Math.floor(i / 7);
                const oct = START_OCTAVE + octaveOffset;
                allKeys.push({ id: `${noteName}${oct}`, name: noteName, octave: oct, isBlack: false, whiteIndex: i });
            }
            const blackSpec = [
                { afterName: 'C', name: 'C#' }, { afterName: 'D', name: 'D#' },
                { afterName: 'F', name: 'F#' }, { afterName: 'G', name: 'G#' }, { afterName: 'A', name: 'A#' }
            ];
            [0, 1].forEach(octaveOffset => {
                blackSpec.forEach(b => {
                    const oct = START_OCTAVE + octaveOffset;
                    allKeys.push({ id: `${b.name}${oct}`, name: b.name, octave: oct, isBlack: true, afterWhiteIndex: octaveOffset * 7 + ['C','D','E','F','G','A','B'].indexOf(b.afterName) });
                });
            });
        }

        // Stage ranges: which white-key indices are visible/active
        const STAGE_CONFIGS = {
            1: { startIndex: 7, endIndex: 14, timed: false },  // C4 to C5 (one octave)
            2: { startIndex: 0, endIndex: 14, timed: false },  // C3 to C5 (two octaves)
            3: { startIndex: 0, endIndex: 14, timed: true, seconds: 15 }
        };

        const dialogs = {
            start: "Hi, I'm Melody! Tap every C you can find on the keyboard!",
            correct: "Great find! Keep going! 🎹",
            allFound: "You found them all! Amazing C hunting! 🌟",
            incorrect: "That's not a C — look for the white key just left of a group of 2 black keys!"
        };

        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playTone(freq, type = 'triangle', duration = 0.5) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (e) {}
        }
        function playSuccessArpeggio() {
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                [261.63, 329.63, 392.00, 523.25].forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0.15, now + idx * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.25);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.25);
                });
            } catch (e) {}
        }
        function playFailBuzz() { playTone(110, 'sawtooth', 0.35); }

        const SVG_MELODY = `
        <svg viewBox="0 0 100 100" class="w-16 h-16 drop-shadow-md">
            <circle cx="50" cy="50" r="35" fill="#2dd4bf" />
            <path d="M 15,50 A 35,35 0 0,0 50,85 Z" fill="#0d9488" />
            <ellipse cx="40" cy="62" rx="15" ry="12" fill="#ccfbf1" />
            <circle cx="65" cy="40" r="7" fill="#ffffff" />
            <circle cx="67" cy="40" r="3.5" fill="#0f172a" />
            <circle cx="69" cy="38" r="1.5" fill="#ffffff" />
            <polygon points="75,45 90,48 78,55" fill="#fb923c" stroke="#ea580c" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M 25,50 C 20,40 35,35 45,50 C 40,60 30,60 25,50 Z" fill="#14b8a6" />
            <path d="M 40,18 Q 30,8 42,12 Q 54,8 44,18" fill="#2dd4bf" />
        </svg>`;

        function setStage(stageNum) {
            currentStage = stageNum;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btn-stage-${i}`);
                if (i === stageNum) {
                    btn.className = "py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-emerald-400 text-white border-b-2 border-emerald-600 shadow";
                } else {
                    btn.className = "py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }
            resetStats();
            newRound();
        }

        function newRound() {
            clearInterval(timerInterval);
            const config = STAGE_CONFIGS[currentStage];
            foundSet = new Set();
            controlLock = false;

            const visibleWhites = allKeys.filter(k => !k.isBlack && k.whiteIndex >= config.startIndex && k.whiteIndex <= config.endIndex);
            totalCs = visibleWhites.filter(k => k.name === 'C').length;

            document.getElementById('progress-text').innerText = `Found 0 / ${totalCs} C's`;
            document.getElementById('mascot-dialog').innerText = dialogs.start;

            renderPiano();

            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-lg font-bold text-slate-700 my-3";
            feedback.innerText = "Tap a C to begin!";

            const timerEl = document.getElementById('timer-text');
            if (config.timed) {
                timerEl.classList.remove('hidden');
                timeLeft = config.seconds;
                timerEl.innerText = `⏱️ ${timeLeft}s`;
                timerInterval = setInterval(() => {
                    timeLeft--;
                    timerEl.innerText = `⏱️ ${timeLeft}s`;
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        onTimeUp();
                    }
                }, 1000);
            } else {
                timerEl.classList.add('hidden');
            }
        }

        function renderPiano() {
            const container = document.getElementById('piano-container');
            container.innerHTML = '';
            const config = STAGE_CONFIGS[currentStage];
            const whiteKeys = allKeys.filter(k => !k.isBlack && k.whiteIndex >= config.startIndex && k.whiteIndex <= config.endIndex);

            whiteKeys.forEach((key) => {
                const keyDiv = document.createElement('div');
                const isFound = foundSet.has(key.id);
                keyDiv.className = `white-key flex-1 min-w-0 bg-white border-r-2 border-slate-200 rounded-b-xl h-full relative select-none cursor-pointer ${isFound ? 'found' : ''}`;
                keyDiv.dataset.note = key.id;
                keyDiv.addEventListener('mousedown', () => handleKeyClick(key, keyDiv));
                container.appendChild(keyDiv);
            });

            const containerWidth = container.clientWidth - 16;
            const whiteKeyWidth = containerWidth / whiteKeys.length;

            const blackKeys = allKeys.filter(k => k.isBlack && k.afterWhiteIndex >= config.startIndex && k.afterWhiteIndex < config.endIndex);
            blackKeys.forEach((key) => {
                const blackDiv = document.createElement('div');
                blackDiv.className = `black-key absolute bg-slate-950 rounded-b-lg z-30 select-none cursor-pointer`;
                blackDiv.style.height = '3.5rem';
                blackDiv.style.width = `${whiteKeyWidth * 0.65}px`;
                const relIndex = key.afterWhiteIndex - config.startIndex;
                const leftPos = (relIndex + 1) * whiteKeyWidth + 8 - (whiteKeyWidth * 0.65 / 2);
                blackDiv.style.left = `${leftPos}px`;
                blackDiv.dataset.note = key.id;
                blackDiv.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    handleKeyClick(key, blackDiv);
                });
                container.appendChild(blackDiv);
            });

            if (hintsEnabled) {
                whiteKeys.filter(k => k.name === 'C' && !foundSet.has(k.id)).forEach(k => {
                    const el = container.querySelector(`[data-note="${k.id}"]`);
                    if (el) el.style.boxShadow = 'inset 0 -8px 0 #fbbf24, 0 0 0 3px #fbbf24';
                });
            }
        }

        function handleKeyClick(key, keyElement) {
            if (controlLock) return;

            if (key.name === 'C') {
                if (foundSet.has(key.id)) return; // already found
                foundSet.add(key.id);
                keyElement.classList.add('found');
                document.getElementById('progress-text').innerText = `Found ${foundSet.size} / ${totalCs} C's`;

                playTone(261.63 * Math.pow(2, key.octave - 4), 'triangle', 0.4);

                if (foundSet.size >= totalCs) {
                    onAllFound();
                } else {
                    document.getElementById('mascot-dialog').innerText = dialogs.correct;
                }
            } else {
                streak = 0;
                lives--;
                document.getElementById('streak').innerText = streak;
                updateHearts();

                keyElement.classList.add('wrong-flash');
                setTimeout(() => keyElement.classList.remove('wrong-flash'), 400);

                const feedback = document.getElementById('feedback');
                feedback.className = "text-center text-lg font-bold text-rose-500 my-3";
                feedback.innerText = "That's not a C!";

                playFailBuzz();
                document.getElementById('mascot-dialog').innerText = dialogs.incorrect;

                if (lives <= 0) {
                    clearInterval(timerInterval);
                    controlLock = true;
                    setTimeout(triggerGameOver, 800);
                }
            }
        }

        function onAllFound() {
            clearInterval(timerInterval);
            score += 10 * totalCs;
            streak++;
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;

            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-lg font-bold text-green-600 my-3";
            feedback.innerText = `⭐ You found all the C's! ⭐`;

            triggerConfetti();
            document.getElementById('mascot-dialog').innerText = dialogs.allFound;

            const avatar = document.getElementById('mascot-avatar');
            avatar.className = "mascot-spin shrink-0";
            controlLock = true;
            setTimeout(() => { avatar.className = "mascot-bounce shrink-0"; }, 600);

            if (streak > 0 && streak % 5 === 0) {
                setTimeout(triggerStageComplete, 1000);
            } else {
                setTimeout(newRound, 1400);
            }
        }

        function onTimeUp() {
            streak = 0;
            lives--;
            document.getElementById('streak').innerText = streak;
            updateHearts();

            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-lg font-bold text-rose-500 my-3";
            feedback.innerText = "Time's up! Let's try again.";

            playFailBuzz();
            document.getElementById('mascot-dialog').innerText = "Time ran out! Quick, let's try another round!";

            if (lives <= 0) {
                controlLock = true;
                setTimeout(triggerGameOver, 800);
            } else {
                setTimeout(newRound, 1200);
            }
        }

        function triggerConfetti() {
            const holder = document.getElementById('confetti-holder');
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#a855f7', '#ff7849'];
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 120;
                particle.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = '50%';
                particle.style.top = '50%';
                holder.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function updateHearts() {
            const container = document.getElementById('hearts-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) container.innerHTML += i < lives ? '❤️' : '🖤';
        }

        function triggerStageComplete() {
            playSuccessArpeggio();
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-mascot').innerHTML = SVG_MELODY;
            document.getElementById('overlay-title').innerText = "🌟 Sensational! 🌟";
            const oMsg = document.getElementById('overlay-msg');
            const oBtn = document.getElementById('overlay-btn');

            if (currentStage < 3) {
                oMsg.innerText = `You completed Stage ${currentStage}! Ready for Stage ${currentStage + 1}?`;
                oBtn.innerText = "Go to Next Stage!";
                oBtn.onclick = () => { dismissOverlay(); setStage(currentStage + 1); };
            } else {
                oMsg.innerText = `Incredible! You can hunt down every C on the keyboard!`;
                oBtn.innerText = "Play Again!";
                oBtn.onclick = () => { dismissOverlay(); resetGame(); };
            }
            overlay.classList.remove('hidden');
        }

        function triggerGameOver() {
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-mascot').innerHTML = SVG_MELODY;
            document.getElementById('overlay-title').innerText = "No More Hearts!";
            document.getElementById('overlay-msg').innerText = "Let's take another look at the keyboard and try this stage again!";
            const oBtn = document.getElementById('overlay-btn');
            oBtn.innerText = "Restart Stage";
            oBtn.onclick = () => { dismissOverlay(); resetStats(); newRound(); };
            overlay.classList.remove('hidden');
        }

        function dismissOverlay() {
            document.getElementById('overlay').classList.add('hidden');
            controlLock = false;
        }

        function resetStats() {
            streak = 0;
            lives = 3;
            document.getElementById('streak').innerText = streak;
            updateHearts();
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            setStage(1);
        }

        function toggleHints() {
            hintsEnabled = !hintsEnabled;
            document.getElementById('hint-btn-text').innerText = hintsEnabled ? "Turn Hints Off" : "Turn Hints On";
            renderPiano();
        }

        window.addEventListener('resize', () => { renderPiano(); });

        window.onload = () => {
            buildKeys();
            document.getElementById('mascot-avatar').innerHTML = SVG_MELODY;
            setStage(1);
        };
    </script>
</body>
</html>
