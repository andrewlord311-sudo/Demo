<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finger Number Fun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #fae8ff 0%, #fef08a 100%);
            min-height: 100vh;
        }
        .kids-title {
            font-family: 'Fredoka One', cursive;
            text-shadow: 3px 3px 0px #a21caf;
        }
        .mascot-bounce { animation: idle-bounce 2s ease-in-out infinite alternate; }
        @keyframes idle-bounce { 0% { transform: translateY(0); } 100% { transform: translateY(-8px); } }
        .mascot-spin { animation: happy-spin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1; }
        @keyframes happy-spin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.3); } 100% { transform: rotate(360deg) scale(1); } }
        .mascot-sad { animation: sad-shake 0.5s ease-in-out 1; }
        @keyframes sad-shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px) rotate(-5deg); } 40%, 80% { transform: translateX(10px) rotate(5deg); } }
        .confetti { position: absolute; pointer-events: none; width: 12px; height: 12px; border-radius: 50%; animation: blow-up 1s ease-out forwards; }
        @keyframes blow-up { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } }

        .finger.active-finger { fill: #fbbf24 !important; stroke: #b45309 !important; }
        .white-key {
            box-shadow: inset 0 -8px 0 #e2e8f0, 0 4px 6px rgba(0,0,0,0.05);
            transition: background-color 0.15s, transform 0.05s, box-shadow 0.05s;
        }
        .white-key.correct-flash { background-color: #86efac !important; }
        .white-key.wrong-flash { background-color: #fca5a5 !important; }
        button { touch-action: manipulation; }
    </style>
</head>
<body class="py-2 px-4 flex items-center justify-center">

    <div id="game-card" class="max-w-xl w-full bg-white rounded-3xl shadow-2xl border-4 border-fuchsia-400 p-4 relative overflow-hidden">

        <div class="flex justify-between items-center mb-2">
            <div class="flex gap-2">
                <span class="bg-yellow-100 text-yellow-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    ⭐ Score: <span id="score">0</span>
                </span>
                <span class="bg-orange-100 text-orange-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    🔥 Streak: <span id="streak">0</span>
                </span>
            </div>
            <div class="flex items-center gap-1 text-2xl" id="hearts-container">❤️❤️❤️</div>
        </div>

        <h1 class="kids-title text-3xl text-fuchsia-600 text-center mb-1">Finger Number Fun</h1>
        <p class="text-slate-500 text-center text-sm font-semibold mb-3">Thumb is 1, pinky is 5 — find the right key!</p>

        <div class="grid grid-cols-3 gap-2 bg-fuchsia-50 p-2 rounded-2xl mb-2 border border-fuchsia-100">
            <button id="btn-stage-1" onclick="setStage(1)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-fuchsia-400 text-white border-b-2 border-fuchsia-600 shadow">
                ☀️ Stage 1: Easy
            </button>
            <button id="btn-stage-2" onclick="setStage(2)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🌴 Stage 2: Medium
            </button>
            <button id="btn-stage-3" onclick="setStage(3)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🚀 Stage 3: Hard
            </button>
        </div>

        <div class="flex items-center gap-3 bg-fuchsia-50 p-2 rounded-2xl border border-fuchsia-100 mb-2">
            <div id="mascot-avatar" class="mascot-bounce shrink-0 transition-transform"></div>
            <div class="relative bg-white border border-fuchsia-100 p-2 rounded-xl shadow-sm w-full">
                <div class="absolute top-1/2 -left-2 w-4 h-4 -translate-y-1/2 rotate-45 bg-white border-l border-b border-fuchsia-50"></div>
                <p id="mascot-dialog" class="text-slate-700 font-bold text-sm leading-snug">
                    Hi, I'm Melody! Rest your hand in the C position: thumb on C, pinky on G!
                </p>
            </div>
        </div>

        <!-- Hand diagram -->
        <div class="relative bg-slate-50 rounded-2xl p-2 border-2 border-slate-200 mb-2 flex justify-center items-center">
            <svg id="hand-svg" viewBox="0 0 300 180" class="w-full max-w-xs">
                <!-- Palm -->
                <ellipse cx="150" cy="140" rx="90" ry="45" fill="#fcd9b6" stroke="#b45309" stroke-width="2" />
                <!-- Fingers 1-5, left to right = thumb to pinky -->
                <g id="finger-1" class="finger" fill="#fcd9b6" stroke="#b45309" stroke-width="2">
                    <ellipse cx="55" cy="120" rx="16" ry="30" transform="rotate(-35 55 120)" />
                    <text x="55" y="95" text-anchor="middle" font-size="18" font-weight="900" fill="#7c2d12">1</text>
                </g>
                <g id="finger-2" class="finger" fill="#fcd9b6" stroke="#b45309" stroke-width="2">
                    <ellipse cx="95" cy="80" rx="15" ry="42" />
                    <text x="95" y="42" text-anchor="middle" font-size="18" font-weight="900" fill="#7c2d12">2</text>
                </g>
                <g id="finger-3" class="finger" fill="#fcd9b6" stroke="#b45309" stroke-width="2">
                    <ellipse cx="140" cy="70" rx="15" ry="48" />
                    <text x="140" y="26" text-anchor="middle" font-size="18" font-weight="900" fill="#7c2d12">3</text>
                </g>
                <g id="finger-4" class="finger" fill="#fcd9b6" stroke="#b45309" stroke-width="2">
                    <ellipse cx="185" cy="76" rx="15" ry="44" />
                    <text x="185" y="36" text-anchor="middle" font-size="18" font-weight="900" fill="#7c2d12">4</text>
                </g>
                <g id="finger-5" class="finger" fill="#fcd9b6" stroke="#b45309" stroke-width="2">
                    <ellipse cx="225" cy="95" rx="14" ry="36" transform="rotate(8 225 95)" />
                    <text x="228" y="65" text-anchor="middle" font-size="18" font-weight="900" fill="#7c2d12">5</text>
                </g>
            </svg>
        </div>

        <div id="question-text" class="text-center text-xl font-black text-slate-800 mb-2">
            Play finger 1!
        </div>

        <div class="relative">
            <div id="piano-container" class="relative flex select-none bg-slate-800 p-2 rounded-2xl border-2 border-slate-300 h-32 w-full overflow-hidden">
            </div>
            <div id="confetti-holder" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
            <div id="overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-2xl flex flex-col justify-center items-center p-6 text-center hidden transition-opacity duration-300 z-50">
                <div id="overlay-mascot" class="mb-3 mascot-bounce"></div>
                <h3 id="overlay-title" class="kids-title text-3xl text-fuchsia-600 mb-2">Stage Passed!</h3>
                <p id="overlay-msg" class="text-slate-600 font-bold mb-4">Incredible job!</p>
                <button id="overlay-btn" onclick="dismissOverlay()" class="bg-yellow-400 text-slate-800 font-extrabold px-8 py-3 rounded-full border-b-4 border-yellow-600 hover:brightness-105 active:scale-95 transition-all text-lg">
                    Next Challenge!
                </button>
            </div>
        </div>

        <div id="feedback" class="text-center text-lg font-bold min-h-[28px] text-slate-700 my-3">
            Tap the matching piano key!
        </div>

        <div class="flex justify-between items-center text-xs">
            <button onclick="toggleHints()" class="bg-purple-100 text-purple-700 border-b-2 border-purple-300 font-bold px-4 py-2 rounded-xl hover:bg-purple-200">
                💡 <span id="hint-btn-text">Turn Hints On</span>
            </button>
            <button onclick="resetGame()" class="bg-rose-100 text-rose-700 border-b-2 border-rose-300 font-bold px-4 py-2 rounded-xl hover:bg-rose-200">
                🔄 Reset Score
            </button>
        </div>

    </div>

    <script>
        let currentStage = 1;
        let score = 0;
        let streak = 0;
        let lives = 3;
        let hintsEnabled = false;
        let controlLock = false;

        const FINGER_NOTES = { 1: 'C4', 2: 'D4', 3: 'E4', 4: 'F4', 5: 'G4' };
        const NOTE_FREQS = { C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00 };

        let sequence = [];
        let sequenceIndex = 0;
        let lastAscendFinger = 0;

        const dialogs = {
            start: "Hi, I'm Melody! Rest your hand in the C position: thumb on C, pinky on G!",
            correct: "Perfect finger work! 🎹",
            incorrect: "Not quite! Check which finger number was asked."
        };

        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playTone(freq, type = 'triangle', duration = 0.5) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (e) {}
        }
        function playSuccessArpeggio() {
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                [261.63, 329.63, 392.00, 523.25].forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0.15, now + idx * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.25);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.25);
                });
            } catch (e) {}
        }
        function playFailBuzz() { playTone(110, 'sawtooth', 0.35); }

        const SVG_MELODY = `
        <svg viewBox="0 0 100 100" class="w-16 h-16 drop-shadow-md">
            <circle cx="50" cy="50" r="35" fill="#2dd4bf" />
            <path d="M 15,50 A 35,35 0 0,0 50,85 Z" fill="#0d9488" />
            <ellipse cx="40" cy="62" rx="15" ry="12" fill="#ccfbf1" />
            <circle cx="65" cy="40" r="7" fill="#ffffff" />
            <circle cx="67" cy="40" r="3.5" fill="#0f172a" />
            <circle cx="69" cy="38" r="1.5" fill="#ffffff" />
            <polygon points="75,45 90,48 78,55" fill="#fb923c" stroke="#ea580c" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M 25,50 C 20,40 35,35 45,50 C 40,60 30,60 25,50 Z" fill="#14b8a6" />
            <path d="M 40,18 Q 30,8 42,12 Q 54,8 44,18" fill="#2dd4bf" />
        </svg>`;

        function setStage(stageNum) {
            currentStage = stageNum;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btn-stage-${i}`);
                if (i === stageNum) {
                    btn.className = "py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-fuchsia-400 text-white border-b-2 border-fuchsia-600 shadow";
                } else {
                    btn.className = "py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }
            lastAscendFinger = 0;
            resetStats();
            renderPiano();
            newRound();
        }

        function newRound() {
            controlLock = false;
            sequenceIndex = 0;

            if (currentStage === 1) {
                lastAscendFinger = (lastAscendFinger % 5) + 1;
                sequence = [lastAscendFinger];
            } else if (currentStage === 2) {
                sequence = [1 + Math.floor(Math.random() * 5)];
            } else {
                const len = 3 + Math.floor(Math.random() * 3); // 3-5
                sequence = [];
                for (let i = 0; i < len; i++) sequence.push(1 + Math.floor(Math.random() * 5));
            }

            updateQuestionText();
            highlightFinger(sequence[0]);

            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-lg font-bold text-slate-700 my-3";
            feedback.innerText = "Tap the matching piano key!";
        }

        function updateQuestionText() {
            if (sequence.length === 1) {
                document.getElementById('question-text').innerText = `Play finger ${sequence[0]}!`;
            } else {
                const parts = sequence.map((f, i) => i === sequenceIndex ? `[${f}]` : f).join(' - ');
                document.getElementById('question-text').innerText = `Play in order: ${parts}`;
            }
        }

        function highlightFinger(n) {
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`finger-${i}`).classList.remove('active-finger');
            }
            document.getElementById(`finger-${n}`).classList.add('active-finger');
        }

        function renderPiano() {
            const container = document.getElementById('piano-container');
            container.innerHTML = '';
            const notes = ['C4', 'D4', 'E4', 'F4', 'G4'];
            notes.forEach(note => {
                const keyDiv = document.createElement('div');
                keyDiv.className = 'white-key flex-1 min-w-0 bg-white border-r-2 border-slate-200 rounded-b-xl h-full relative select-none cursor-pointer flex items-end justify-center pb-2 text-xs font-black text-slate-400';
                keyDiv.dataset.note = note;
                keyDiv.innerText = hintsEnabled ? note.replace('4', '') : '';
                keyDiv.addEventListener('mousedown', () => handleKeyClick(note, keyDiv));
                container.appendChild(keyDiv);
            });
        }

        function handleKeyClick(note, keyElement) {
            if (controlLock) return;
            const expectedFinger = sequence[sequenceIndex];
            const expectedNote = FINGER_NOTES[expectedFinger];

            if (note === expectedNote) {
                keyElement.classList.add('correct-flash');
                setTimeout(() => keyElement.classList.remove('correct-flash'), 400);
                playTone(NOTE_FREQS[note], 'triangle', 0.4);

                sequenceIndex++;
                if (sequenceIndex >= sequence.length) {
                    onSequenceComplete();
                } else {
                    highlightFinger(sequence[sequenceIndex]);
                    updateQuestionText();
                }
            } else {
                keyElement.classList.add('wrong-flash');
                setTimeout(() => keyElement.classList.remove('wrong-flash'), 400);
                onIncorrect();
            }
        }

        function onSequenceComplete() {
            score += 10 * sequence.length;
            streak++;
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = streak;

            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-lg font-bold text-green-600 my-3";
            feedback.innerText = `⭐ Perfect! ⭐`;

            triggerConfetti();
            document.getElementById('mascot-dialog').innerText = dialogs.correct;

            const avatar = document.getElementById('mascot-avatar');
            avatar.className = "mascot-spin shrink-0";
            controlLock = true;
            setTimeout(() => { avatar.className = "mascot-bounce shrink-0"; }, 600);

            if (streak > 0 && streak % 8 === 0) {
                setTimeout(triggerStageComplete, 1000);
            } else {
                setTimeout(newRound, 1200);
            }
        }

        function onIncorrect() {
            streak = 0;
            lives--;
            document.getElementById('streak').innerText = streak;
            updateHearts();

            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-lg font-bold text-rose-500 my-3";
            feedback.innerText = "Not quite — check the finger number!";

            playFailBuzz();
            document.getElementById('mascot-dialog').innerText = dialogs.incorrect;

            const avatar = document.getElementById('mascot-avatar');
            avatar.className = "mascot-sad shrink-0";
            controlLock = true;
            setTimeout(() => {
                avatar.className = "mascot-bounce shrink-0";
                controlLock = false;
            }, 600);

            if (lives <= 0) {
                setTimeout(triggerGameOver, 1000);
            } else {
                sequenceIndex = 0;
                highlightFinger(sequence[0]);
                updateQuestionText();
            }
        }

        function triggerConfetti() {
            const holder = document.getElementById('confetti-holder');
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#a855f7', '#ff7849'];
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 120;
                particle.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = '50%';
                particle.style.top = '50%';
                holder.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function updateHearts() {
            const container = document.getElementById('hearts-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) container.innerHTML += i < lives ? '❤️' : '🖤';
        }

        function triggerStageComplete() {
            playSuccessArpeggio();
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-mascot').innerHTML = SVG_MELODY;
            document.getElementById('overlay-title').innerText = "🌟 Sensational! 🌟";
            const oMsg = document.getElementById('overlay-msg');
            const oBtn = document.getElementById('overlay-btn');

            if (currentStage < 3) {
                oMsg.innerText = `You completed Stage ${currentStage}! Ready for Stage ${currentStage + 1}?`;
                oBtn.innerText = "Go to Next Stage!";
                oBtn.onclick = () => { dismissOverlay(); setStage(currentStage + 1); };
            } else {
                oMsg.innerText = `Amazing! Your fingers know exactly where to go!`;
                oBtn.innerText = "Play Again!";
                oBtn.onclick = () => { dismissOverlay(); resetGame(); };
            }
            overlay.classList.remove('hidden');
        }

        function triggerGameOver() {
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-mascot').innerHTML = SVG_MELODY;
            document.getElementById('overlay-title').innerText = "No More Hearts!";
            document.getElementById('overlay-msg').innerText = "Let's rest our hand in position and try again!";
            const oBtn = document.getElementById('overlay-btn');
            oBtn.innerText = "Restart Stage";
            oBtn.onclick = () => { dismissOverlay(); resetStats(); newRound(); };
            overlay.classList.remove('hidden');
        }

        function dismissOverlay() {
            document.getElementById('overlay').classList.add('hidden');
            controlLock = false;
        }

        function resetStats() {
            streak = 0;
            lives = 3;
            document.getElementById('streak').innerText = streak;
            updateHearts();
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            setStage(1);
        }

        function toggleHints() {
            hintsEnabled = !hintsEnabled;
            document.getElementById('hint-btn-text').innerText = hintsEnabled ? "Turn Hints Off" : "Turn Hints On";
            renderPiano();
        }

        window.onload = () => {
            document.getElementById('mascot-avatar').innerHTML = SVG_MELODY;
            setStage(1);
        };
    </script>
</body>
</html>
