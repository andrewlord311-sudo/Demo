<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stave Piano Explorer!</title>
    <!-- Tailwind CSS for rich modern spacing and responsive utility styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #fef08a 0%, #bbf7d0 100%);
            min-height: 100vh;
        }

        .kids-title {
            font-family: 'Fredoka One', cursive;
            text-shadow: 3px 3px 0px #15803d;
        }

        /* Mascot animations matching our design ecosystem */
        .mascot-bounce {
            animation: idle-bounce 2s ease-in-out infinite alternate;
        }
        @keyframes idle-bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        .mascot-spin {
            animation: happy-spin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1;
        }
        @keyframes happy-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .mascot-sad {
            animation: sad-shake 0.5s ease-in-out 1;
        }
        @keyframes sad-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px) rotate(-5deg); }
            40%, 80% { transform: translateX(10px) rotate(5deg); }
        }

        /* Confetti particle explosion animation */
        .confetti {
            position: absolute;
            pointer-events: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: blow-up 1s ease-out forwards;
        }
        @keyframes blow-up {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0);
                opacity: 0;
            }
        }

        /* Key scaling and transitions */
        .white-key {
            box-shadow: inset 0 -8px 0 #e2e8f0, 0 4px 6px rgba(0,0,0,0.05);
            transition: background-color 0.1s, transform 0.05s, box-shadow 0.05s;
        }
        .white-key:active, .white-key.active-press {
            background-color: #f1f5f9;
            box-shadow: inset 0 -2px 0 #cbd5e1, 0 1px 3px rgba(0,0,0,0.05);
            transform: translateY(4px);
        }

        .black-key {
            box-shadow: inset 0 -6px 0 #000000, 0 3px 5px rgba(0,0,0,0.3);
            transition: background-color 0.1s, transform 0.05s, box-shadow 0.05s;
        }
        .black-key:active, .black-key.active-press {
            background-color: #334155;
            box-shadow: inset 0 -2px 0 #000000, 0 1px 2px rgba(0,0,0,0.3);
            transform: translateY(2px);
        }

        button {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="py-1 px-4 flex items-center justify-center">

    <div id="game-card" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl border-4 border-green-400 p-3 relative overflow-hidden">

        <!-- Scoreboard Header -->
        <div class="flex justify-between items-center mb-2">
            <div class="flex gap-2">
                <span class="bg-yellow-100 text-yellow-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    ⭐ Score: <span id="score">0</span>
                </span>
                <span class="bg-orange-100 text-orange-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    🔥 Streak: <span id="streak">0</span>
                </span>
            </div>
            <div class="flex items-center gap-1 text-2xl" id="hearts-container">
                ❤️❤️❤️
            </div>
        </div>

        <!-- Title Header -->
        <h1 class="kids-title text-2xl text-green-600 text-center mb-0.5">Stave Piano Explorer</h1>
        <p class="text-slate-500 text-center text-xs font-semibold mb-1.5">Press the correct key on the piano keyboard!</p>

        <!-- Clef Swapping Controls -->
        <div class="grid grid-cols-2 gap-3 mb-1.5">
            <button id="btn-treble" onclick="setClef('treble')" class="flex items-center justify-center gap-2 py-1.5 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-green-500 text-white shadow-md border-b-4 border-green-700 scale-105">
                <span class="text-lg">🎼</span> Treble Clef (Melody)
            </button>
            <button id="btn-bass" onclick="setClef('bass')" class="flex items-center justify-center gap-2 py-1.5 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-slate-100 text-slate-700 border-b-4 border-slate-300 hover:bg-slate-200">
                <span class="text-lg">𝄢</span> Bass Clef (Barnaby)
            </button>
        </div>

        <!-- Difficulty Stages Selection -->
        <div class="grid grid-cols-3 gap-2 bg-emerald-50 p-1.5 rounded-2xl mb-1.5 border border-emerald-100">
            <button id="btn-stage-1" onclick="setStage(1)" class="py-1 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-emerald-400 text-white border-b-2 border-emerald-600 shadow">
                ☀️ Stage 1: Easy
            </button>
            <button id="btn-stage-2" onclick="setStage(2)" class="py-1 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🌴 Stage 2: Medium
            </button>
            <button id="btn-stage-3" onclick="setStage(3)" class="py-1 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🚀 Stage 3: Hard
            </button>
        </div>

        <!-- Mascot Speech Bubble Dialog -->
        <div class="flex items-center gap-3 bg-emerald-50 p-1.5 rounded-2xl border border-emerald-100 mb-1.5">
            <div id="mascot-avatar" class="mascot-bounce shrink-0 transition-transform">
                <!-- SVG Injected dynamically -->
            </div>
            <div class="relative bg-white border border-emerald-100 p-2 rounded-xl shadow-sm w-full">
                <div class="absolute top-1/2 -left-2 w-4 h-4 -translate-y-1/2 rotate-45 bg-white border-l border-b border-emerald-50"></div>
                <p id="mascot-dialog" class="text-slate-700 font-bold text-sm leading-snug">
                    Welcome to the keyboard! Press the correct key to test out my synthesizer!
                </p>
            </div>
        </div>

        <!-- Main Canvas Staff Display -->
        <div class="relative bg-slate-50 rounded-2xl p-2 border-2 border-slate-200 mb-1.5 flex justify-center items-center">
            <canvas id="canvas" width="400" height="240" class="max-h-32 w-auto rounded-xl bg-white shadow-inner"></canvas>

            <!-- Confetti Canvas Overlay -->
            <div id="confetti-holder" class="absolute inset-0 pointer-events-none overflow-hidden rounded-2xl"></div>

            <!-- Standard Game Over/Stage Clear Overlay Frame -->
            <div id="overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-2xl flex flex-col justify-center items-center p-6 text-center hidden transition-opacity duration-300 z-50">
                <div id="overlay-mascot" class="mb-3 mascot-bounce"></div>
                <h3 id="overlay-title" class="kids-title text-3xl text-green-600 mb-2">Stage Passed!</h3>
                <p id="overlay-msg" class="text-slate-600 font-bold mb-4">Incredible job!</p>
                <button id="overlay-btn" onclick="dismissOverlay()" class="bg-yellow-400 text-slate-800 font-extrabold px-8 py-3 rounded-full border-b-4 border-yellow-600 hover:brightness-105 active:scale-95 transition-all text-lg">
                    Next Challenge!
                </button>
            </div>
        </div>

        <!-- Feedback Banner -->
        <div id="feedback" class="text-center text-base font-bold min-h-[22px] text-slate-700 mb-1.5">
            Press the correct piano key below!
        </div>

        <!-- Interactive Keyboard Container (Permanently locked to C3 - C5, two octaves around Middle C) -->
        <div class="mb-1.5">
            <div class="bg-slate-100 p-1 rounded-t-2xl border-t-2 border-x-2 border-slate-200 text-xs font-bold text-slate-600 text-center tracking-wide">
                Two-Octave Range centered around Middle C
            </div>
            <!-- Actual Piano Keys Container -->
            <div id="piano-container" class="relative flex select-none bg-slate-800 p-2 rounded-b-2xl border-x-2 border-b-4 border-slate-300 h-28 w-full overflow-hidden">
                <!-- White & Black Keys are programmatically injected here -->
            </div>
        </div>

        <!-- Footer Extras -->
        <div class="flex justify-between items-center text-xs">
            <button onclick="toggleHints()" class="bg-purple-100 text-purple-700 border-b-2 border-purple-300 font-bold px-4 py-2 rounded-xl hover:bg-purple-200">
                💡 <span id="hint-btn-text">Turn Hints On</span>
            </button>
            <button onclick="resetGame()" class="bg-rose-100 text-rose-700 border-b-2 border-rose-300 font-bold px-4 py-2 rounded-xl hover:bg-rose-200">
                🔄 Reset Score
            </button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Gamified state
        let currentClef = 'treble'; // 'treble' | 'bass'
        let currentStage = 1;       // 1 | 2 | 3
        let currentNote = null;
        let score = 0;
        let streak = 0;
        let lives = 3;
        let hintsEnabled = false;
        let controlLock = false;

        // Permanently set piano keyboard starting offset to C3 - C5
        // Start note is C3, making C4 (Middle C) the 8th white key (perfectly centered)
        const START_OCTAVE = 3; 

        // Complete database of notes strictly within the C3 to C5 range, keeping ledger lines limited to maximum 1.
        const TREBLE_DATABASE = {
            "B3": { name: "B", octave: 3, lineStep: -3, freq: 246.94, desc: "B3 (sitting just under Middle C's ledger line!)" },
            "C4": { name: "C", octave: 4, lineStep: -2, freq: 261.63, desc: "Middle C (sitting below the lines with its own ledger line!)" },
            "D4": { name: "D", octave: 4, lineStep: -1, freq: 293.66, desc: "D (hanging just underneath the bottom line!)" },
            "E4": { name: "E", octave: 4, lineStep: 0, freq: 329.63, desc: "E (resting on the very bottom line)" },
            "F4": { name: "F", octave: 4, lineStep: 1, freq: 349.23, desc: "F (inside the lowest space. Spells F-A-C-E!)" },
            "G4": { name: "G", octave: 4, lineStep: 2, freq: 392.00, desc: "G (resting on the second line)" },
            "A4": { name: "A", octave: 4, lineStep: 3, freq: 440.00, desc: "A (inside the second space. Spells F-A-C-E!)" },
            "B4": { name: "B", octave: 4, lineStep: 4, freq: 493.88, desc: "B (resting on the middle line)" },
            "C5": { name: "C", octave: 5, lineStep: 5, freq: 523.25, desc: "C (inside the third space. Spells F-A-C-E!)" }
        };

        const BASS_DATABASE = {
            "C3": { name: "C", octave: 3, lineStep: 3, freq: 130.81, desc: "C3 (resting snug inside the second space)" },
            "D3": { name: "D", octave: 3, lineStep: 4, freq: 146.83, desc: "D3 (resting on the middle line)" },
            "E3": { name: "E", octave: 3, lineStep: 5, freq: 164.81, desc: "E3 (resting inside the third space)" },
            "F3": { name: "F", octave: 3, lineStep: 6, freq: 174.61, desc: "F3 (resting on the fourth line)" },
            "G3": { name: "G", octave: 3, lineStep: 7, freq: 196.00, desc: "G3 (resting inside the top space)" },
            "A3": { name: "A", octave: 3, lineStep: 8, freq: 220.00, desc: "A3 (on the very top line)" },
            "B3": { name: "B", octave: 3, lineStep: 9, freq: 246.94, desc: "B3 (resting right above the top line)" },
            "C4": { name: "C", octave: 4, lineStep: 10, freq: 261.63, desc: "Middle C (sitting on top with a ledger line!)" },
            "D4": { name: "D", octave: 4, lineStep: 11, freq: 293.66, desc: "D4 (hanging right above Middle C's ledger line!)" }
        };

        // Calibrated Stage Pools (strictly limited to C3 - C5 values, no more than 1 ledger line above/below)
        const STAGE_POOLS = {
            treble: {
                1: ["C4", "D4", "E4", "F4", "G4"], // Middle C to G4
                2: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5"], // Middle C to C5
                3: ["B3", "C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5"] // Maximum 1 ledger line below (B3 to C5)
            },
            bass: {
                1: ["C3", "D3", "E3", "F3", "G3"], // C3 to G3 (all inside the staff lines)
                2: ["C3", "D3", "E3", "F3", "G3", "A3", "B3", "C4"], // C3 to Middle C (1 ledger line above)
                3: ["C3", "D3", "E3", "F3", "G3", "A3", "B3", "C4", "D4"] // Maximum 1 ledger line above (C3 to D4)
            }
        };

        // Sound Engine (Web Audio API)
        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }

        function playTone(freq, type = 'triangle', duration = 0.5) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        function playSuccessArpeggio() {
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                // Pleasant arpeggio arcing upward
                [261.63, 329.63, 392.00, 523.25].forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0.15, now + idx * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.25);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.25);
                });
            } catch(e) {}
        }

        function playFailBuzz() {
            playTone(110, 'sawtooth', 0.35);
        }

        // Mascot inline SVGs
        const SVG_MELODY = `
        <svg viewBox="0 0 100 100" class="w-16 h-16 drop-shadow-md">
            <circle cx="50" cy="50" r="35" fill="#2dd4bf" />
            <path d="M 15,50 A 35,35 0 0,0 50,85 Z" fill="#0d9488" />
            <ellipse cx="40" cy="62" rx="15" ry="12" fill="#ccfbf1" />
            <circle cx="65" cy="40" r="7" fill="#ffffff" />
            <circle cx="67" cy="40" r="3.5" fill="#0f172a" />
            <circle cx="69" cy="38" r="1.5" fill="#ffffff" />
            <polygon points="75,45 90,48 78,55" fill="#fb923c" stroke="#ea580c" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M 25,50 C 20,40 35,35 45,50 C 40,60 30,60 25,50 Z" fill="#14b8a6" />
            <path d="M 40,18 Q 30,8 42,12 Q 54,8 44,18" fill="#2dd4bf" />
        </svg>`;

        const SVG_BARNABY = `
        <svg viewBox="0 0 100 100" class="w-16 h-16 drop-shadow-md">
            <circle cx="25" cy="25" r="12" fill="#818cf8" />
            <circle cx="25" cy="25" r="7" fill="#c7d2fe" />
            <circle cx="75" cy="25" r="12" fill="#818cf8" />
            <circle cx="75" cy="25" r="7" fill="#c7d2fe" />
            <circle cx="50" cy="55" r="32" fill="#6366f1" />
            <circle cx="30" cy="62" r="5" fill="#f472b6" opacity="0.6" />
            <circle cx="70" cy="62" r="5" fill="#f472b6" opacity="0.6" />
            <ellipse cx="50" cy="68" rx="16" ry="11" fill="#e0e7ff" />
            <polygon points="46,63 54,63 50,68" fill="#1e1b4b" stroke="#1e1b4b" stroke-width="1" stroke-linejoin="round" />
            <path d="M 32,48 Q 40,40 42,48" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" />
            <path d="M 58,48 Q 60,40 68,48" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" />
        </svg>`;

        const dialogs = {
            treble: {
                start: "Hi, I'm Melody! Let's find out which piano key matches this treble note!",
                correct: "Incredible keyboard skills! You hit the perfect key! 🎹🎉",
                incorrect: "Almost! Check the stave lines and find the correct piano note.",
                stage1: "Treble Easy Range: Middle C (C4) to G (G4)",
                stage2: "Treble Medium Range: Middle C (C4) to C (C5)",
                stage3: "Treble Hard Range: B3 to C5 (No more than one ledger line below!)"
            },
            bass: {
                start: "Rumble rumble! I'm Barnaby! Can you tap the correct deep piano key?",
                correct: "Fantastic! You are reading bass notes like a pro! 🐻🎶",
                incorrect: "Don't fret! Try counting upward from the bottom line again.",
                stage1: "Bass Easy Range: C3 to G3",
                stage2: "Bass Medium Range: C3 up to Middle C (C4)",
                stage3: "Bass Hard Range: C3 up to D4 (D4 sits just above Middle C's ledger line!)"
            }
        };

        // Core frequencies corresponding directly to note names for playbacks
        const noteFreqs = {
            "C3": 130.81, "C#3": 138.59, "D3": 146.83, "D#3": 155.56, "E3": 164.81, "F3": 174.61, "F#3": 185.00, "G3": 196.00, "G#3": 207.65, "A3": 220.00, "A#3": 233.08, "B3": 246.94,
            "C4": 261.63, "C#4": 277.18, "D4": 293.66, "D#4": 311.13, "E4": 329.63, "F4": 349.23, "F#4": 369.99, "G4": 392.00, "G#4": 415.30, "A4": 440.00, "A#4": 466.16, "B4": 493.88,
            "C5": 523.25
        };

        function setClef(clef) {
            currentClef = clef;
            const btnTreble = document.getElementById('btn-treble');
            const btnBass = document.getElementById('btn-bass');
            
            if (clef === 'treble') {
                btnTreble.className = "flex items-center justify-center gap-2 py-3 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-green-500 text-white shadow-md border-b-4 border-green-700 scale-105";
                btnBass.className = "flex items-center justify-center gap-2 py-3 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-slate-100 text-slate-700 border-b-4 border-slate-300 hover:bg-slate-200";
            } else {
                btnBass.className = "flex items-center justify-center gap-2 py-3 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-green-500 text-white shadow-md border-b-4 border-green-700 scale-105";
                btnTreble.className = "flex items-center justify-center gap-2 py-3 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-slate-100 text-slate-700 border-b-4 border-slate-300 hover:bg-slate-200";
            }

            setMascotAvatar();
            setStage(1); // Re-initialize to easy level upon clef swap
        }

        function setStage(stageNum) {
            currentStage = stageNum;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btn-stage-${i}`);
                if (i === stageNum) {
                    btn.className = "py-2 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-emerald-400 text-white border-b-2 border-emerald-600 shadow";
                } else {
                    btn.className = "py-2 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }

            // Print stage instructions
            const labelKey = `stage${stageNum}`;
            document.getElementById('mascot-dialog').innerText = dialogs[currentClef][labelKey];

            resetStats();
            newRound();
        }

        function setMascotAvatar() {
            document.getElementById('mascot-avatar').innerHTML = currentClef === 'treble' ? SVG_MELODY : SVG_BARNABY;
        }

        // Draw staff lines, clefs, and hollow note heads (lines go through them)
        function drawStaff() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const startY = 80;
            const lineGap = 16; 
            const width = 340;
            const startX = 30;

            // 1. Draw 5 main horizontal stave lines
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2.5;
            for (let i = 0; i < 5; i++) {
                let y = startY + i * lineGap;
                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.lineTo(startX + width, y);
                ctx.stroke();
            }

            // 2. Draw Clef icon (Noto Music web font for correct, consistent glyph shapes)
            ctx.textBaseline = 'alphabetic';
            ctx.textAlign = 'left';
            if (currentClef === 'treble') {
                ctx.font = `${lineGap * 4}px "Noto Music", serif`;
                ctx.fillStyle = '#1e293b';
                ctx.fillText("\u{1D11E}", startX + 6, startY + 4 * lineGap);
            } else {
                ctx.font = `${lineGap * 4}px "Noto Music", serif`;
                ctx.fillStyle = '#1e293b';
                ctx.fillText("\u{1D122}", startX + 6, startY + 3.625 * lineGap);
            }

            // Translate note step coordinate
            const noteY = startY + (8 - currentNote.lineStep) * (lineGap / 2);
            const noteX = canvas.width / 2 + 30;

            // 3. Draw Ledger helper lines if notes fall outside standard 5-line stave boundary
            // Below stave boundary (e.g. C4 or below on treble)
            if (currentNote.lineStep <= -2) {
                for (let i = -2; i >= currentNote.lineStep; i -= 2) {
                    let ledgerY = startY + (8 - i) * (lineGap / 2);
                    ctx.strokeStyle = '#334155';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(noteX - 18, ledgerY);
                    ctx.lineTo(noteX + 18, ledgerY);
                    ctx.stroke();
                }
            }
            // Above stave boundary (e.g. C4 or above on bass)
            if (currentNote.lineStep >= 10) {
                for (let i = 10; i <= currentNote.lineStep; i += 2) {
                    let ledgerY = startY + (8 - i) * (lineGap / 2);
                    ctx.strokeStyle = '#334155';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(noteX - 18, ledgerY);
                    ctx.lineTo(noteX + 18, ledgerY);
                    ctx.stroke();
                }
            }

            // 4. Draw HOLLOW MINIM Note Head (Lines pass beautifully through the center!)
            ctx.save();
            ctx.translate(noteX, noteY);
            ctx.rotate(-0.25);
            
            // To make sure the staff line is visible running through the center of the note head,
            // we do NOT fill it with white. We only stroke the thick blue outline.
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 4.5;
            ctx.beginPath();
            ctx.ellipse(0, 0, 11, 7.5, 0, 0, 2 * Math.PI);
            ctx.stroke();
            ctx.restore();

            // 5. Draw Stem (vertical line extending from minim head)
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            if (currentNote.lineStep >= 4) {
                // Stem pointing down on left side
                ctx.moveTo(noteX - 11, noteY);
                ctx.lineTo(noteX - 11, noteY + 45);
            } else {
                // Stem pointing up on right side
                ctx.moveTo(noteX + 11, noteY);
                ctx.lineTo(noteX + 11, noteY - 45);
            }
            ctx.stroke();

            // 6. Draw hint overlay if enabled
            if (hintsEnabled) {
                ctx.fillStyle = '#7c3aed';
                ctx.font = 'bold 13px Quicksand, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(currentNote.desc, canvas.width / 2, canvas.height - 15);
            }
        }

        function newRound() {
            const list = STAGE_POOLS[currentClef][currentStage];
            const db = currentClef === 'treble' ? TREBLE_DATABASE : BASS_DATABASE;
            
            let pickedKey;
            do {
                pickedKey = list[Math.floor(Math.random() * list.length)];
            } while (list.length > 1 && currentNote && pickedKey === (currentNote.name + currentNote.octave));

            currentNote = db[pickedKey];
            controlLock = false;

            drawStaff();
            renderPiano();
            
            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-xl font-bold text-slate-700 mb-4";
            feedback.innerText = "Press the correct piano key below!";
        }

        // Programmatic piano builder (Permanently restricted to C3 - C5, two octaves)
        function renderPiano() {
            const container = document.getElementById('piano-container');
            container.innerHTML = '';

            const whiteNotes = ['C', 'D', 'E', 'F', 'G', 'A', 'B', 'C', 'D', 'E', 'F', 'G', 'A', 'B', 'C'];
            const keysData = [];

            // Build structural data for white keys starting from C3 up to C5
            for (let i = 0; i < 15; i++) {
                const noteName = whiteNotes[i];
                const octaveOffset = Math.floor(i / 7);
                const currentOct = START_OCTAVE + octaveOffset;
                const noteID = `${noteName}${currentOct}`;

                keysData.push({
                    id: noteID,
                    name: noteName,
                    octave: currentOct,
                    isBlack: false,
                    index: i
                });
            }

            // Render White Keys (no note names except Middle C)
            keysData.forEach((key) => {
                const keyDiv = document.createElement('div');
                const isCorrectNote = (key.id === (currentNote.name + currentNote.octave));
                const isMiddleC = (key.id === "C4"); // Middle C is exactly C4
                
                keyDiv.className = `white-key flex-1 min-w-0 bg-white border-r-2 border-slate-200 rounded-b-xl flex flex-col justify-end items-center pb-3 text-xs font-black text-slate-500 cursor-pointer h-full relative select-none`;
                keyDiv.dataset.note = key.id;
                
                // Show simple "Middle C" label only on C4 key
                if (isMiddleC) {
                    const label = document.createElement('span');
                    label.innerText = "Middle C";
                    label.className = "absolute bottom-2 left-1/2 -translate-x-1/2 -rotate-90 origin-center text-[9px] text-emerald-600 font-extrabold uppercase bg-emerald-50 px-1 py-0.5 rounded border border-emerald-200 text-center leading-none whitespace-nowrap z-10";
                    keyDiv.appendChild(label);
                }

                // If hints are enabled and this is the correct answer, add a soft flashing indicator dot
                if (hintsEnabled && isCorrectNote) {
                    const hintDot = document.createElement('div');
                    hintDot.className = "absolute top-4 w-3.5 h-3.5 rounded-full bg-purple-500 animate-ping";
                    keyDiv.appendChild(hintDot);
                }

                // Handle click triggers
                keyDiv.addEventListener('mousedown', () => handleKeyInteraction(key.id, keyDiv));
                container.appendChild(keyDiv);
            });

            // Map standard black keys placement coordinates inside 2-octave sets
            const blackOffsets = [
                { afterIndex: 0, name: "C#" },
                { afterIndex: 1, name: "D#" },
                { afterIndex: 3, name: "F#" },
                { afterIndex: 4, name: "G#" },
                { afterIndex: 5, name: "A#" },
                { afterIndex: 7, name: "C#" },
                { afterIndex: 8, name: "D#" },
                { afterIndex: 10, name: "F#" },
                { afterIndex: 11, name: "G#" },
                { afterIndex: 12, name: "A#" }
            ];

            const containerWidth = container.clientWidth - 16; // Adjusting for container padding
            const whiteKeyWidth = containerWidth / 15;

            // Render Black Keys absolutely positioned on top of the white ones
            blackOffsets.forEach((bo) => {
                const octaveOffset = Math.floor(bo.afterIndex / 7);
                const currentOct = START_OCTAVE + octaveOffset;
                const noteID = `${bo.name}${currentOct}`;

                const blackDiv = document.createElement('div');
                blackDiv.className = `black-key absolute bg-slate-950 rounded-b-lg cursor-pointer h-14 z-30 select-none`;
                blackDiv.style.width = `${whiteKeyWidth * 0.65}px`;
                
                // Position black key centrally over the boundary gap of the white keys
                const leftPos = (bo.afterIndex + 1) * whiteKeyWidth + 8 - (whiteKeyWidth * 0.65 / 2);
                blackDiv.style.left = `${leftPos}px`;
                blackDiv.dataset.note = noteID;

                // Handle click triggers
                blackDiv.addEventListener('mousedown', (e) => {
                    e.stopPropagation(); // Stop click from triggering underlying white key
                    handleKeyInteraction(noteID, blackDiv);
                });

                container.appendChild(blackDiv);
            });
        }

        // Process piano key presses
        function handleKeyInteraction(noteID, keyElement) {
            if (controlLock) return;

            const targetID = currentNote.name + currentNote.octave;

            // Add transient click animation style
            keyElement.classList.add('active-press');
            setTimeout(() => {
                keyElement.classList.remove('active-press');
            }, 150);

            if (noteID === targetID) {
                // Correct Choice
                score += 10;
                streak++;
                document.getElementById('score').innerText = score;
                document.getElementById('streak').innerText = streak;

                const feedback = document.getElementById('feedback');
                feedback.className = "text-center text-2xl font-bold text-green-600 mb-4 bouncy";
                feedback.innerText = `⭐ Beautiful! That is ${noteID}! ⭐`;

                // Synthesize the note's frequency
                if (noteFreqs[noteID]) {
                    playTone(noteFreqs[noteID], 'triangle', 0.6);
                }

                triggerConfetti();
                document.getElementById('mascot-dialog').innerText = dialogs[currentClef].correct;
                
                // Animate mascot
                const avatar = document.getElementById('mascot-avatar');
                avatar.className = "mascot-spin shrink-0";
                controlLock = true;

                setTimeout(() => {
                    avatar.className = "mascot-bounce shrink-0";
                }, 600);

                if (streak > 0 && streak % 10 === 0) {
                    setTimeout(triggerStageComplete, 1000);
                } else {
                    setTimeout(newRound, 1500);
                }
            } else {
                // Incorrect Choice
                streak = 0;
                lives--;
                document.getElementById('streak').innerText = streak;
                updateHearts();

                const feedback = document.getElementById('feedback');
                feedback.className = "text-center text-xl font-bold text-rose-500 mb-4";
                feedback.innerText = "Close! Let's listen and try another key!";

                // Sound the incorrect pitch so they hear the mistake, then play fail buzz
                if (noteFreqs[noteID]) {
                    playTone(noteFreqs[noteID], 'sine', 0.35);
                }
                setTimeout(playFailBuzz, 250);

                document.getElementById('mascot-dialog').innerText = dialogs[currentClef].incorrect;
                const avatar = document.getElementById('mascot-avatar');
                avatar.className = "mascot-sad shrink-0";
                
                controlLock = true;
                setTimeout(() => {
                    avatar.className = "mascot-bounce shrink-0";
                    controlLock = false;
                }, 600);

                if (lives <= 0) {
                    setTimeout(triggerGameOver, 1000);
                }
            }
        }

        function triggerConfetti() {
            const holder = document.getElementById('confetti-holder');
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#a855f7', '#ff7849'];
            
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 120;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                
                particle.style.setProperty('--dx', `${dx}px`);
                particle.style.setProperty('--dy', `${dy}px`);
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = '50%';
                particle.style.top = '50%';
                
                holder.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        function updateHearts() {
            const container = document.getElementById('hearts-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                container.innerHTML += i < lives ? '❤️' : '🖤';
            }
        }

        function triggerStageComplete() {
            playSuccessArpeggio();
            const overlay = document.getElementById('overlay');
            const oMascot = document.getElementById('overlay-mascot');
            const oTitle = document.getElementById('overlay-title');
            const oMsg = document.getElementById('overlay-msg');
            const oBtn = document.getElementById('overlay-btn');

            oMascot.innerHTML = currentClef === 'treble' ? SVG_MELODY : SVG_BARNABY;
            oTitle.innerText = "🌟 Sensational! 🌟";
            
            if (currentStage < 3) {
                oMsg.innerText = `You completed Stage ${currentStage}! Ready to try Stage ${currentStage + 1}?`;
                oBtn.innerText = "Go to Next Stage!";
                oBtn.onclick = () => {
                    dismissOverlay();
                    setStage(currentStage + 1);
                };
            } else {
                oMsg.innerText = `Outstanding! You conquered all keyboard levels on the ${currentClef === 'treble' ? 'Treble' : 'Bass'} clef!`;
                oBtn.innerText = "Play Again!";
                oBtn.onclick = () => {
                    dismissOverlay();
                    resetGame();
                };
            }

            overlay.classList.remove('hidden');
        }

        function triggerGameOver() {
            const overlay = document.getElementById('overlay');
            const oMascot = document.getElementById('overlay-mascot');
            const oTitle = document.getElementById('overlay-title');
            const oMsg = document.getElementById('overlay-msg');
            const oBtn = document.getElementById('overlay-btn');

            oMascot.innerHTML = SVG_BARNABY; // Barnaby comforts the player
            oTitle.innerText = "No More Hearts!";
            oMsg.innerText = "Let's replenish your hearts and retry this stage together!";
            oBtn.innerText = "Restart Stage";
            oBtn.onclick = () => {
                dismissOverlay();
                resetStats();
                newRound();
            };

            overlay.classList.remove('hidden');
        }

        function dismissOverlay() {
            document.getElementById('overlay').classList.add('hidden');
        }

        function resetStats() {
            streak = 0;
            lives = 3;
            document.getElementById('streak').innerText = streak;
            updateHearts();
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            setClef('treble');
        }

        function toggleHints() {
            hintsEnabled = !hintsEnabled;
            const btnText = document.getElementById('hint-btn-text');
            btnText.innerText = hintsEnabled ? "Turn Hints Off" : "Turn Hints On";
            
            drawStaff();
            renderPiano();
        }

        // Handle scaling adjustments on window resizing
        window.addEventListener('resize', () => {
            renderPiano();
        });

        window.onload = async () => {
            // Load the music-glyph font explicitly via the FontFace API rather than
            // relying on @import + fonts.load(string) — that combination doesn't
            // reliably register the font before Canvas fillText/measureText need it,
            // causing an intermittent fallback to a generic (mis-sized) serif glyph.
            try {
                const notoMusicFont = new FontFace(
                    'Noto Music',
                    'url(https://fonts.gstatic.com/s/notomusic/v21/pe0rMIiSN5pO63htf1sxEkW7I9tAcVwob5A.woff2)'
                );
                document.fonts.add(notoMusicFont);
                await notoMusicFont.load();
            } catch (e) {
                console.warn('Noto Music font failed to load; clef will use fallback serif glyph.', e);
            }
            setClef('treble');
        };
    </script>
</body>
