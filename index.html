<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" sizes="192x192" href="assets/icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Games Arcade</title>
<style>
  :root{
    --bg-top:#ffe9c7;
    --bg-bot:#ffd3e0;
    --ink:#4a3728;
    --card-shadow:rgba(90,60,30,0.22);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; min-height:100%;
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, #fff6d8 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, #ffe0ec 0%, transparent 45%),
      linear-gradient(180deg, var(--bg-top), var(--bg-bot) 70%);
    min-height:100vh;
  }
  .wrap{ max-width:1100px; margin:0 auto; padding:36px 20px 60px; }

  header{ text-align:center; margin-bottom:8px; }
  header h1{
    font-size:38px; margin:0 0 6px;
    color:#7a3f5a;
    text-shadow:0 2px 0 rgba(255,255,255,0.6);
  }
  header p{ margin:0; font-size:15px; color:#8a5c6f; opacity:0.9; }

  .bunting{
    display:flex; justify-content:center; gap:6px; margin:18px 0 34px;
  }
  .bunting span{
    width:0; height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-top:22px solid;
  }
  .bunting span:nth-child(1){ border-top-color:#ef6f8e; }
  .bunting span:nth-child(2){ border-top-color:#f4c542; }
  .bunting span:nth-child(3){ border-top-color:#4a9d5f; }
  .bunting span:nth-child(4){ border-top-color:#3fa7d6; }
  .bunting span:nth-child(5){ border-top-color:#9b6fd6; }
  .bunting span:nth-child(6){ border-top-color:#ef6f8e; }
  .bunting span:nth-child(7){ border-top-color:#f4c542; }
  .bunting span:nth-child(8){ border-top-color:#4a9d5f; }

  h2.section-heading{
    text-align:center; font-size:22px; margin:8px 0 18px;
    color:#7a3f5a; text-shadow:0 2px 0 rgba(255,255,255,0.6);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:22px;
    margin-bottom:36px;
  }
  @media (max-width:900px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:520px){ .grid{ grid-template-columns:1fr; } }

  .card{
    position:relative;
    border-radius:22px;
    padding:22px 18px 20px;
    background:#fffdf6;
    box-shadow:0 10px 0 var(--card-shadow), 0 18px 30px rgba(90,60,30,0.15);
    display:flex; flex-direction:column; align-items:center; text-align:center;
    transition:transform .15s ease, box-shadow .15s ease;
    border:3px solid rgba(255,255,255,0.7);
  }
  .card:hover{
    transform:translateY(-6px) rotate(-0.5deg);
    box-shadow:0 14px 0 var(--card-shadow), 0 22px 36px rgba(90,60,30,0.2);
  }
  .card .icon-badge{
    width:78px; height:78px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:38px;
    margin-bottom:12px;
    box-shadow:inset 0 -6px 10px rgba(0,0,0,0.08), 0 4px 10px rgba(0,0,0,0.12);
  }
  .card h2{
    font-size:18px; margin:2px 0 8px;
    color:#4a3728;
  }
  .card p{
    font-size:13px; line-height:1.45;
    color:#6b5745;
    margin:0 0 16px;
    min-height:56px;
  }
  .play-btn{
    appearance:none; border:none; cursor:pointer;
    text-decoration:none;
    font-family:inherit; font-size:14px; font-weight:800; color:#fff;
    padding:10px 22px; border-radius:14px;
    box-shadow:0 5px 0 rgba(0,0,0,0.18), 0 8px 14px rgba(0,0,0,0.15);
    transition:transform .08s ease, box-shadow .08s ease, filter .15s ease;
    display:inline-block;
  }
  .play-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,0.18), 0 3px 6px rgba(0,0,0,0.15); }
  .play-btn.disabled{
    filter:grayscale(0.5) brightness(0.95);
    cursor:not-allowed;
    pointer-events:none;
  }
  .badge-soon{
    position:absolute; top:14px; right:14px;
    background:#f4c542; color:#5a4308;
    font-size:10px; font-weight:800; letter-spacing:0.5px;
    padding:4px 8px; border-radius:8px;
    text-transform:uppercase;
  }

  footer{
    text-align:center; margin-top:40px;
    font-size:11px; color:#8a5c6f; opacity:0.8;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎪 Tiny Games Arcade</h1>
    <p>Pick a game below to play!</p>
  </header>

  <div class="bunting">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <h2 class="section-heading">🎵 Music Games</h2>
  <div class="grid" id="grid-music"></div>

  <h2 class="section-heading">🎲 Fun &amp; Pretend Play</h2>
  <div class="grid" id="grid-fun"></div>

  <footer>Made with ❤️ — edit the MUSIC_GAMES / FUN_GAMES lists in the page source to add your own games.</footer>
</div>

<script>
/* ======================================================================
   EDIT THIS LIST TO ADD / CHANGE YOUR GAMES
   ----------------------------------------------------------------------
   Each entry needs:
     title       - the game's name, shown on the card
     description - a short one or two sentence blurb
     emoji       - a single emoji shown in the round icon badge
     color       - hex color used for the icon badge + play button
     file        - the filename (or full path/URL) of the game's HTML file
                   Put the actual game .html file in the SAME FOLDER as
                   this hub page (or change the path if it lives elsewhere).
     comingSoon  - set to true to grey out the "Play" button and show a
                   "Coming soon" ribbon instead of linking anywhere yet.

   To add a 9th, 10th... game, just copy one of the {...} blocks below,
   paste it into the array, and fill in your own details.
   ====================================================================== */
  const MUSIC_GAMES = [
    { title: "Alphabet Elevator", description: "The music alphabet only has 7 letters — A to G! Ride the elevator to the right one.", emoji: "🛗", color: "#f0a63f", file: "music/alphabet_elevator.html", comingSoon: false },
    { title: "Black Key Patterns", description: "Spot the groups of 2 and 3 black keys — they're your landmarks on the keyboard.", emoji: "⚫", color: "#2fb6c4", file: "music/black_key_patterns.html", comingSoon: false },
    { title: "C Hunt", description: "Find every C hiding on the piano keyboard!", emoji: "🔍", color: "#3fbf7a", file: "music/c_hunt.html", comingSoon: false },
    { title: "Clef Detective", description: "Crack the case — can you name that clef?", emoji: "🕵️", color: "#8a6fd6", file: "music/clef_detective.html", comingSoon: false },
    { title: "Finger Number Fun", description: "Thumb is 1, pinky is 5 — find the right key for each finger.", emoji: "✋", color: "#d64fae", file: "music/finger_numbers.html", comingSoon: false },
    { title: "Higher, Lower or Same?", description: "Compare two notes on the stave — which one's higher?", emoji: "📊", color: "#3f8fd6", file: "music/higher_lower_same.html", comingSoon: false },
    { title: "Line & Space Safari", description: "Help the animal friends sort musical notes onto lines and spaces.", emoji: "🦁", color: "#e0793f", file: "music/line_and_space_safari.html", comingSoon: false },
    { title: "Name That Part", description: "Drag each label onto the matching part of the stave.", emoji: "🏷️", color: "#e8567e", file: "music/name_that_part.html", comingSoon: false },
    { title: "Stave Explorer", description: "Can you find the notes on the stave?", emoji: "🎼", color: "#ef6f8e", file: "music/stave_explorer_game.html", comingSoon: false },
    { title: "Stave Piano Explorer", description: "Press the correct key on the piano keyboard to match the note.", emoji: "🎹", color: "#3fa860", file: "music/stave_piano_explorer.html", comingSoon: false },
    { title: "White Note Step or Skip", description: "Using only the white keys — is it a step or a skip?", emoji: "🪜", color: "#9d5cd6", file: "music/step_or_skip.html", comingSoon: false }
  ];

  const FUN_GAMES = [
    { title: "Biscuit's Playroom", description: "Play ball, run the tunnel, tuck Biscuit into bed, or serve up dinner.", emoji: "🐹", color: "#e8834a", file: "fun/Fun6.html", comingSoon: false },
    { title: "Rex's Letter Adventure", description: "Rex the dino calls out a letter — click the right one to make him do a trick!", emoji: "🦕", color: "#4a9d5f", file: "fun/Fun7.html", comingSoon: false },
    { title: "Guinea pig playground", description: "Look after your guinea pig.", emoji: "💓", color: "#3fa7d6", file: "fun/Fun4.html", comingSoon: false },
    { title: "Dino playground", description: "Look after your dino.", emoji: "🦖", color: "#9b6fd6", file: "fun/Fun5.html", comingSoon: false }
  ];
/* ==================================================================== */

  function hexToRgba(hex, alpha){
    const h = hex.replace('#','');
    const r = parseInt(h.substring(0,2),16);
    const g = parseInt(h.substring(2,4),16);
    const b = parseInt(h.substring(4,6),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function renderGrid(games, gridEl){
    games.forEach(game=>{
      const card = document.createElement('div');
      card.className = 'card';

      if(game.comingSoon){
        const ribbon = document.createElement('div');
        ribbon.className = 'badge-soon';
        ribbon.textContent = 'Coming soon';
        card.appendChild(ribbon);
      }

      const icon = document.createElement('div');
      icon.className = 'icon-badge';
      icon.style.background = `linear-gradient(180deg, ${hexToRgba(game.color,0.35)}, ${hexToRgba(game.color,0.7)})`;
      icon.textContent = game.emoji;
      card.appendChild(icon);

      const h2 = document.createElement('h2');
      h2.textContent = game.title;
      card.appendChild(h2);

      const p = document.createElement('p');
      p.textContent = game.description;
      card.appendChild(p);

      const btn = document.createElement('a');
      btn.textContent = game.comingSoon ? 'Coming soon' : 'Play ▶';
      btn.className = 'play-btn' + (game.comingSoon ? ' disabled' : '');
      btn.style.background = `linear-gradient(180deg, ${game.color}, ${hexToRgba(game.color,0.85)})`;
      if(!game.comingSoon){
        btn.href = game.file;
        btn.rel = 'noopener';
      } else {
        btn.href = '#';
        btn.addEventListener('click', e=> e.preventDefault());
      }
      card.appendChild(btn);

      gridEl.appendChild(card);
    });
  }

  renderGrid(MUSIC_GAMES, document.getElementById('grid-music'));
  renderGrid(FUN_GAMES, document.getElementById('grid-fun'));
</script>
</body>
</html>
