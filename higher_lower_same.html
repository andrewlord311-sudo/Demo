<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher, Lower or Same?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle, #dbeafe 0%, #bbf7d0 100%);
            min-height: 100vh;
        }

        .kids-title {
            font-family: 'Fredoka One', cursive;
            text-shadow: 3px 3px 0px #1d4ed8;
        }

        .mascot-bounce { animation: idle-bounce 2s ease-in-out infinite alternate; }
        @keyframes idle-bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }
        .mascot-spin { animation: happy-spin 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1; }
        @keyframes happy-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }
        .mascot-sad { animation: sad-shake 0.5s ease-in-out 1; }
        @keyframes sad-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px) rotate(-5deg); }
            40%, 80% { transform: translateX(10px) rotate(5deg); }
        }

        .confetti {
            position: absolute;
            pointer-events: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: blow-up 1s ease-out forwards;
        }
        @keyframes blow-up {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        button { touch-action: manipulation; }
    </style>
</head>
<body class="py-2 px-4 flex items-center justify-center">

    <div id="game-card" class="max-w-xl w-full bg-white rounded-3xl shadow-2xl border-4 border-blue-400 p-4 relative overflow-hidden">

        <!-- Scoreboard Header -->
        <div class="flex justify-between items-center mb-2">
            <div class="flex gap-2">
                <span class="bg-yellow-100 text-yellow-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    ⭐ Score: <span id="score">0</span>
                </span>
                <span class="bg-orange-100 text-orange-800 px-3 py-1.5 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                    🔥 Streak: <span id="streak">0</span>
                </span>
            </div>
            <div class="flex items-center gap-1 text-2xl" id="hearts-container">
                ❤️❤️❤️
            </div>
        </div>

        <!-- Title -->
        <h1 class="kids-title text-3xl text-blue-600 text-center mb-1">Higher, Lower or Same?</h1>
        <p class="text-slate-500 text-center text-sm font-semibold mb-3">Compare the two notes on the stave!</p>

        <!-- Clef Swapping Controls -->
        <div class="grid grid-cols-2 gap-3 mb-2">
            <button id="btn-treble" onclick="setClef('treble')" class="flex items-center justify-center gap-2 py-2 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-blue-500 text-white shadow-md border-b-4 border-blue-700 scale-105">
                <span class="text-lg">🎼</span> Treble Clef (Melody)
            </button>
            <button id="btn-bass" onclick="setClef('bass')" class="flex items-center justify-center gap-2 py-2 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-slate-100 text-slate-700 border-b-4 border-slate-300 hover:bg-slate-200">
                <span class="text-lg">𝄢</span> Bass Clef (Barnaby)
            </button>
        </div>

        <!-- Difficulty Stages Selection -->
        <div class="grid grid-cols-3 gap-2 bg-sky-50 p-2 rounded-2xl mb-2 border border-sky-100">
            <button id="btn-stage-1" onclick="setStage(1)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-sky-400 text-white border-b-2 border-sky-600 shadow">
                ☀️ Stage 1: Easy
            </button>
            <button id="btn-stage-2" onclick="setStage(2)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🌴 Stage 2: Medium
            </button>
            <button id="btn-stage-3" onclick="setStage(3)" class="py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200">
                🚀 Stage 3: Hard
            </button>
        </div>

        <!-- Mascot Dialog -->
        <div class="flex items-center gap-3 bg-sky-50 p-2 rounded-2xl border border-sky-100 mb-2">
            <div id="mascot-avatar" class="mascot-bounce shrink-0 transition-transform"></div>
            <div class="relative bg-white border border-sky-100 p-2 rounded-xl shadow-sm w-full">
                <div class="absolute top-1/2 -left-2 w-4 h-4 -translate-y-1/2 rotate-45 bg-white border-l border-b border-sky-50"></div>
                <p id="mascot-dialog" class="text-slate-700 font-bold text-sm leading-snug">
                    Let's compare! Is the second note higher, lower, or the same as the first?
                </p>
            </div>
        </div>

        <!-- Main Canvas Staff Display -->
        <div class="relative bg-slate-50 rounded-2xl p-2 border-2 border-slate-200 mb-2 flex justify-center items-center">
            <canvas id="canvas" width="400" height="220" class="max-h-40 w-auto rounded-xl bg-white shadow-inner"></canvas>
            <div id="confetti-holder" class="absolute inset-0 pointer-events-none overflow-hidden rounded-2xl"></div>

            <div id="overlay" class="absolute inset-0 bg-white/95 backdrop-blur-sm rounded-2xl flex flex-col justify-center items-center p-6 text-center hidden transition-opacity duration-300 z-50">
                <div id="overlay-mascot" class="mb-3 mascot-bounce"></div>
                <h3 id="overlay-title" class="kids-title text-3xl text-blue-600 mb-2">Stage Passed!</h3>
                <p id="overlay-msg" class="text-slate-600 font-bold mb-4">Incredible job!</p>
                <button id="overlay-btn" onclick="dismissOverlay()" class="bg-yellow-400 text-slate-800 font-extrabold px-8 py-3 rounded-full border-b-4 border-yellow-600 hover:brightness-105 active:scale-95 transition-all text-lg">
                    Next Challenge!
                </button>
            </div>
        </div>

        <!-- Feedback Banner -->
        <div id="feedback" class="text-center text-lg font-bold min-h-[28px] text-slate-700 mb-3">
            Is the second note higher, lower, or the same?
        </div>

        <!-- Answer Buttons -->
        <div class="grid grid-cols-3 gap-3 mb-3">
            <button onclick="makeGuess('up')" class="bg-gradient-to-b from-green-400 to-green-500 hover:from-green-500 hover:to-green-600 text-white font-black py-5 rounded-2xl border-b-4 border-green-700 active:translate-y-0.5 active:border-b-2 transition-all shadow-md flex flex-col items-center gap-1">
                <span class="text-3xl">⬆️</span>
                <span class="text-lg">HIGHER</span>
            </button>
            <button onclick="makeGuess('same')" class="bg-gradient-to-b from-amber-400 to-amber-500 hover:from-amber-500 hover:to-amber-600 text-white font-black py-5 rounded-2xl border-b-4 border-amber-700 active:translate-y-0.5 active:border-b-2 transition-all shadow-md flex flex-col items-center gap-1">
                <span class="text-3xl">➡️</span>
                <span class="text-lg">SAME</span>
            </button>
            <button onclick="makeGuess('down')" class="bg-gradient-to-b from-rose-400 to-rose-500 hover:from-rose-500 hover:to-rose-600 text-white font-black py-5 rounded-2xl border-b-4 border-rose-700 active:translate-y-0.5 active:border-b-2 transition-all shadow-md flex flex-col items-center gap-1">
                <span class="text-3xl">⬇️</span>
                <span class="text-lg">LOWER</span>
            </button>
        </div>

        <!-- Footer Extras -->
        <div class="flex justify-between items-center text-xs">
            <button onclick="toggleHints()" class="bg-purple-100 text-purple-700 border-b-2 border-purple-300 font-bold px-4 py-2 rounded-xl hover:bg-purple-200">
                💡 <span id="hint-btn-text">Turn Hints On</span>
            </button>
            <button onclick="resetGame()" class="bg-rose-100 text-rose-700 border-b-2 border-rose-300 font-bold px-4 py-2 rounded-xl hover:bg-rose-200">
                🔄 Reset Score
            </button>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentClef = 'treble';
        let currentStage = 1;
        let refNote = null;
        let targetNote = null;
        let correctAnswer = null;
        let score = 0;
        let streak = 0;
        let lives = 3;
        let hintsEnabled = false;
        let controlLock = false;

        // Note pools with lineStep: each unit = one letter-name step (C,D,E,F,G,A,B all adjacent)
        const TREBLE_NOTES = [
            { name: 'C', octave: 4, lineStep: -2, freq: 261.63, desc: 'Middle C' },
            { name: 'D', octave: 4, lineStep: -1, freq: 293.66, desc: 'D, just under the bottom line' },
            { name: 'E', octave: 4, lineStep: 0, freq: 329.63, desc: 'E, on the bottom line' },
            { name: 'F', octave: 4, lineStep: 1, freq: 349.23, desc: 'F, in the lowest space' },
            { name: 'G', octave: 4, lineStep: 2, freq: 392.00, desc: 'G, on the second line' },
            { name: 'A', octave: 4, lineStep: 3, freq: 440.00, desc: 'A, in the second space' },
            { name: 'B', octave: 4, lineStep: 4, freq: 493.88, desc: 'B, on the middle line' },
            { name: 'C', octave: 5, lineStep: 5, freq: 523.25, desc: 'C, in the third space' },
            { name: 'D', octave: 5, lineStep: 6, freq: 587.33, desc: 'D, on the fourth line' },
            { name: 'E', octave: 5, lineStep: 7, freq: 659.25, desc: 'E, in the top space' }
        ];

        const BASS_NOTES = [
            { name: 'C', octave: 3, lineStep: 3, freq: 130.81, desc: 'C, in the second space' },
            { name: 'D', octave: 3, lineStep: 4, freq: 146.83, desc: 'D, on the middle line' },
            { name: 'E', octave: 3, lineStep: 5, freq: 164.81, desc: 'E, in the third space' },
            { name: 'F', octave: 3, lineStep: 6, freq: 174.61, desc: 'F, on the fourth line' },
            { name: 'G', octave: 3, lineStep: 7, freq: 196.00, desc: 'G, in the top space' },
            { name: 'A', octave: 3, lineStep: 8, freq: 220.00, desc: 'A, on the top line' },
            { name: 'B', octave: 3, lineStep: 9, freq: 246.94, desc: 'B, just above the top line' },
            { name: 'C', octave: 4, lineStep: 10, freq: 261.63, desc: 'Middle C' }
        ];

        const STAGE_CONFIGS = {
            1: { minDiff: 3, maxDiff: 99, outcomes: ['up', 'down'], desc: "Stage 1: Big jumps — easy to spot!" },
            2: { minDiff: 1, maxDiff: 1, outcomes: ['up', 'down'], desc: "Stage 2: Neighbouring steps — look closely!" },
            3: { minDiff: 1, maxDiff: 99, outcomes: ['up', 'down', 'same'], desc: "Stage 3: Anything goes — steps, skips, or the same note!" }
        };

        const dialogs = {
            treble: {
                start: "Hi, I'm Melody! Let's compare two notes on the treble stave!",
                correct: "Brilliant! You spotted the direction perfectly! 🎶",
                incorrect: "Close! Look at where each note sits on the stave.",
            },
            bass: {
                start: "Rumble rumble! I'm Barnaby! Let's compare some low notes!",
                correct: "Wonderful! Your ear (and eyes) are spot on! 🐻🎶",
                incorrect: "Not quite! Count the lines and spaces again.",
            }
        };

        let audioCtx = null;
        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playTone(freq, type = 'triangle', duration = 0.5) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch (e) {}
        }
        function playSuccessArpeggio() {
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                [261.63, 329.63, 392.00, 523.25].forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0.15, now + idx * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.25);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.25);
                });
            } catch (e) {}
        }
        function playFailBuzz() { playTone(110, 'sawtooth', 0.35); }

        const SVG_MELODY = `
        <svg viewBox="0 0 100 100" class="w-16 h-16 drop-shadow-md">
            <circle cx="50" cy="50" r="35" fill="#2dd4bf" />
            <path d="M 15,50 A 35,35 0 0,0 50,85 Z" fill="#0d9488" />
            <ellipse cx="40" cy="62" rx="15" ry="12" fill="#ccfbf1" />
            <circle cx="65" cy="40" r="7" fill="#ffffff" />
            <circle cx="67" cy="40" r="3.5" fill="#0f172a" />
            <circle cx="69" cy="38" r="1.5" fill="#ffffff" />
            <polygon points="75,45 90,48 78,55" fill="#fb923c" stroke="#ea580c" stroke-width="1.5" stroke-linejoin="round" />
            <path d="M 25,50 C 20,40 35,35 45,50 C 40,60 30,60 25,50 Z" fill="#14b8a6" />
            <path d="M 40,18 Q 30,8 42,12 Q 54,8 44,18" fill="#2dd4bf" />
        </svg>`;

        const SVG_BARNABY = `
        <svg viewBox="0 0 100 100" class="w-16 h-16 drop-shadow-md">
            <circle cx="25" cy="25" r="12" fill="#818cf8" />
            <circle cx="25" cy="25" r="7" fill="#c7d2fe" />
            <circle cx="75" cy="25" r="12" fill="#818cf8" />
            <circle cx="75" cy="25" r="7" fill="#c7d2fe" />
            <circle cx="50" cy="55" r="32" fill="#6366f1" />
            <circle cx="30" cy="62" r="5" fill="#f472b6" opacity="0.6" />
            <circle cx="70" cy="62" r="5" fill="#f472b6" opacity="0.6" />
            <ellipse cx="50" cy="68" rx="16" ry="11" fill="#e0e7ff" />
            <polygon points="46,63 54,63 50,68" fill="#1e1b4b" stroke="#1e1b4b" stroke-width="1" stroke-linejoin="round" />
            <path d="M 32,48 Q 40,40 42,48" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" />
            <path d="M 58,48 Q 60,40 68,48" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" />
        </svg>`;

        function setMascotAvatar() {
            document.getElementById('mascot-avatar').innerHTML = currentClef === 'treble' ? SVG_MELODY : SVG_BARNABY;
        }

        function setClef(clef) {
            currentClef = clef;
            const btnTreble = document.getElementById('btn-treble');
            const btnBass = document.getElementById('btn-bass');
            if (clef === 'treble') {
                btnTreble.className = "flex items-center justify-center gap-2 py-2 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-blue-500 text-white shadow-md border-b-4 border-blue-700 scale-105";
                btnBass.className = "flex items-center justify-center gap-2 py-2 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-slate-100 text-slate-700 border-b-4 border-slate-300 hover:bg-slate-200";
            } else {
                btnBass.className = "flex items-center justify-center gap-2 py-2 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-blue-500 text-white shadow-md border-b-4 border-blue-700 scale-105";
                btnTreble.className = "flex items-center justify-center gap-2 py-2 px-4 rounded-2xl font-bold text-sm transition-all duration-300 bg-slate-100 text-slate-700 border-b-4 border-slate-300 hover:bg-slate-200";
            }
            setMascotAvatar();
            document.getElementById('mascot-dialog').innerText = dialogs[currentClef].start;
            setStage(1);
        }

        function setStage(stageNum) {
            currentStage = stageNum;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btn-stage-${i}`);
                if (i === stageNum) {
                    btn.className = "py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-sky-400 text-white border-b-2 border-sky-600 shadow";
                } else {
                    btn.className = "py-1.5 px-1 rounded-xl font-bold text-xs transition-all duration-200 bg-slate-100 text-slate-600 hover:bg-slate-200";
                }
            }
            resetStats();
            newRound();
        }

        function newRound() {
            const pool = currentClef === 'treble' ? TREBLE_NOTES : BASS_NOTES;
            const config = STAGE_CONFIGS[currentStage];

            // Pick the outcome FIRST (equal chance across whichever outcomes this
            // stage supports), then find a note pair that produces it — this
            // guarantees up/down/same are represented evenly instead of leaving
            // it to chance (which under-represents "same" since it's a single
            // exact match out of many possible pairs).
            const outcome = config.outcomes[Math.floor(Math.random() * config.outcomes.length)];

            let a, b, diff;
            let attempts = 0;
            do {
                a = pool[Math.floor(Math.random() * pool.length)];
                if (outcome === 'same') {
                    b = a;
                    diff = 0;
                } else {
                    b = pool[Math.floor(Math.random() * pool.length)];
                    diff = Math.abs(a.lineStep - b.lineStep);
                }
                attempts++;
            } while (
                attempts < 300 && (
                    diff < config.minDiff || diff > config.maxDiff ||
                    (outcome === 'up' && b.lineStep <= a.lineStep) ||
                    (outcome === 'down' && b.lineStep >= a.lineStep)
                )
            );

            refNote = a;
            targetNote = b;
            correctAnswer = targetNote.lineStep > refNote.lineStep ? 'up' : (targetNote.lineStep < refNote.lineStep ? 'down' : 'same');
            controlLock = false;

            drawStave();

            const feedback = document.getElementById('feedback');
            feedback.className = "text-center text-lg font-bold text-slate-700 mb-3";
            feedback.innerText = "Is the second note higher, lower, or the same?";

            // Play both notes in sequence so the child can HEAR the difference,
            // not just see it.
            setTimeout(() => playTone(refNote.freq, 'triangle', 0.45), 300);
            setTimeout(() => playTone(targetNote.freq, 'triangle', 0.45), 900);
        }

        function drawNoteAt(noteX, note, staffTop, lineGap, color, alpha) {
            const noteY = staffTop + (4 - (note.lineStep / 2)) * lineGap;

            ctx.globalAlpha = alpha;

            // Ledger lines
            if (note.lineStep <= -2) {
                for (let i = -2; i >= note.lineStep; i -= 2) {
                    let ledgerY = staffTop + (4 - (i / 2)) * lineGap;
                    ctx.strokeStyle = '#334155';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(noteX - 16, ledgerY);
                    ctx.lineTo(noteX + 16, ledgerY);
                    ctx.stroke();
                }
            }
            if (note.lineStep >= 10) {
                for (let i = 10; i <= note.lineStep; i += 2) {
                    let ledgerY = staffTop + (4 - (i / 2)) * lineGap;
                    ctx.strokeStyle = '#334155';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(noteX - 16, ledgerY);
                    ctx.lineTo(noteX + 16, ledgerY);
                    ctx.stroke();
                }
            }

            // Note head
            ctx.save();
            ctx.translate(noteX, noteY);
            ctx.rotate(-0.25);
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.ellipse(0, 0, 10, 7, 0, 0, 2 * Math.PI);
            ctx.fill();
            ctx.restore();

            // Stem
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            if (note.lineStep >= 4) {
                ctx.moveTo(noteX - 10, noteY);
                ctx.lineTo(noteX - 10, noteY + 40);
            } else {
                ctx.moveTo(noteX + 10, noteY);
                ctx.lineTo(noteX + 10, noteY - 40);
            }
            ctx.stroke();

            ctx.globalAlpha = 1;
            return noteY;
        }

        function drawStave() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const staffTop = 70;
            const lineGap = 16;
            const width = 340;
            const startX = 30;

            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2.5;
            for (let i = 0; i < 5; i++) {
                let y = staffTop + i * lineGap;
                ctx.beginPath();
                ctx.moveTo(startX, y);
                ctx.lineTo(startX + width, y);
                ctx.stroke();
            }

            ctx.textBaseline = 'alphabetic';
            ctx.textAlign = 'left';
            if (currentClef === 'treble') {
                ctx.font = `${lineGap * 4}px "Noto Music", serif`;
                ctx.fillStyle = '#1e293b';
                ctx.fillText("\u{1D11E}", startX + 6, staffTop + 4 * lineGap);
            } else {
                ctx.font = `${lineGap * 4}px "Noto Music", serif`;
                ctx.fillStyle = '#1e293b';
                ctx.fillText("\u{1D122}", startX + 6, staffTop + 3.625 * lineGap);
            }

            const refX = 190;
            const targetX = 300;

            drawNoteAt(refX, refNote, staffTop, lineGap, '#94a3b8', 0.85);
            drawNoteAt(targetX, targetNote, staffTop, lineGap, '#2563eb', 1);

            // Labels
            ctx.font = 'bold 20px Quicksand, sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.textAlign = 'center';
            ctx.fillText('1st', refX, staffTop + 5 * lineGap + 24);
            ctx.fillStyle = '#2563eb';
            ctx.fillText('2nd', targetX, staffTop + 5 * lineGap + 24);

            if (hintsEnabled) {
                ctx.fillStyle = '#7c3aed';
                ctx.font = 'bold 12px Quicksand, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${refNote.name}${refNote.octave} → ${targetNote.name}${targetNote.octave} (${correctAnswer.toUpperCase()})`, canvas.width / 2, staffTop + 5 * lineGap + 30);
            }
        }

        function makeGuess(answer) {
            if (controlLock) return;

            const feedback = document.getElementById('feedback');

            if (answer === correctAnswer) {
                score += 10;
                streak++;
                document.getElementById('score').innerText = score;
                document.getElementById('streak').innerText = streak;

                feedback.className = "text-center text-lg font-bold text-green-600 mb-3";
                feedback.innerText = `⭐ Yes! It went ${correctAnswer.toUpperCase()}! ⭐`;

                playTone(targetNote.freq, 'triangle', 0.5);
                triggerConfetti();
                document.getElementById('mascot-dialog').innerText = dialogs[currentClef].correct;

                const avatar = document.getElementById('mascot-avatar');
                avatar.className = "mascot-spin shrink-0";
                controlLock = true;
                setTimeout(() => { avatar.className = "mascot-bounce shrink-0"; }, 600);

                if (streak > 0 && streak % 10 === 0) {
                    setTimeout(triggerStageComplete, 1000);
                } else {
                    setTimeout(newRound, 1200);
                }
            } else {
                streak = 0;
                lives--;
                document.getElementById('streak').innerText = streak;
                updateHearts();

                feedback.className = "text-center text-lg font-bold text-rose-500 mb-3";
                feedback.innerText = "Close! Look again at where each note sits.";

                playFailBuzz();
                document.getElementById('mascot-dialog').innerText = dialogs[currentClef].incorrect;

                const avatar = document.getElementById('mascot-avatar');
                avatar.className = "mascot-sad shrink-0";
                controlLock = true;
                setTimeout(() => {
                    avatar.className = "mascot-bounce shrink-0";
                    controlLock = false;
                }, 600);

                if (lives <= 0) {
                    setTimeout(triggerGameOver, 1000);
                }
            }
        }

        function triggerConfetti() {
            const holder = document.getElementById('confetti-holder');
            const colors = ['#f43f5e', '#3b82f6', '#10b981', '#eab308', '#a855f7', '#ff7849'];
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                const angle = Math.random() * Math.PI * 2;
                const distance = 80 + Math.random() * 120;
                particle.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = '50%';
                particle.style.top = '50%';
                holder.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        function updateHearts() {
            const container = document.getElementById('hearts-container');
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) container.innerHTML += i < lives ? '❤️' : '🖤';
        }

        function triggerStageComplete() {
            playSuccessArpeggio();
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-mascot').innerHTML = currentClef === 'treble' ? SVG_MELODY : SVG_BARNABY;
            document.getElementById('overlay-title').innerText = "🌟 Sensational! 🌟";
            const oMsg = document.getElementById('overlay-msg');
            const oBtn = document.getElementById('overlay-btn');

            if (currentStage < 3) {
                oMsg.innerText = `You completed Stage ${currentStage}! Ready for Stage ${currentStage + 1}?`;
                oBtn.innerText = "Go to Next Stage!";
                oBtn.onclick = () => { dismissOverlay(); setStage(currentStage + 1); };
            } else {
                oMsg.innerText = `Outstanding! You mastered comparing notes on the ${currentClef === 'treble' ? 'Treble' : 'Bass'} clef!`;
                oBtn.innerText = "Play Again!";
                oBtn.onclick = () => { dismissOverlay(); resetGame(); };
            }
            overlay.classList.remove('hidden');
        }

        function triggerGameOver() {
            const overlay = document.getElementById('overlay');
            document.getElementById('overlay-mascot').innerHTML = SVG_BARNABY;
            document.getElementById('overlay-title').innerText = "No More Hearts!";
            document.getElementById('overlay-msg').innerText = "Let's replenish your hearts and retry this stage together!";
            const oBtn = document.getElementById('overlay-btn');
            oBtn.innerText = "Restart Stage";
            oBtn.onclick = () => { dismissOverlay(); resetStats(); newRound(); };
            overlay.classList.remove('hidden');
        }

        function dismissOverlay() { document.getElementById('overlay').classList.add('hidden'); }

        function resetStats() {
            streak = 0;
            lives = 3;
            document.getElementById('streak').innerText = streak;
            updateHearts();
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = score;
            setClef('treble');
        }

        function toggleHints() {
            hintsEnabled = !hintsEnabled;
            document.getElementById('hint-btn-text').innerText = hintsEnabled ? "Turn Hints Off" : "Turn Hints On";
            drawStave();
        }

        window.onload = async () => {
            try {
                const notoMusicFont = new FontFace(
                    'Noto Music',
                    'url(https://fonts.gstatic.com/s/notomusic/v21/pe0rMIiSN5pO63htf1sxEkW7I9tAcVwob5A.woff2)'
                );
                document.fonts.add(notoMusicFont);
                await notoMusicFont.load();
            } catch (e) {
                console.warn('Noto Music font failed to load; clef will use fallback serif glyph.', e);
            }
            setClef('treble');
        };
    </script>
</body>
</html>
