<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
* {
box-sizing: border-box;
}

body {
margin: 0;
padding: 0;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
/* Changed to a bright, festive gradient so it's never black */
background: linear-gradient(135deg, #ff007f, #7928ca, #00dfd8);
background-size: 400% 400%;
font-family: 'Arial Black', Gadget, sans-serif;
overflow: hidden;
animation: gradientShift 8s ease infinite;
}

/* The Card Container /
.card {
background: #ffffff; / Solid white background so content is perfectly visible */
border: 8px solid #000;
border-radius: 20px;
padding: 40px;
text-align: center;
max-width: 450px;
width: 90%;
box-shadow: 0px 10px 30px rgba(0,0,0,0.5);

/* Border flashing animation */
animation: borderFlash 0.4s infinite alternate;
}

/* Title Flashing Effect */
.title {
font-size: 3.5rem;
margin: 0 0 10px 0;
text-transform: uppercase;
line-height: 1.1;
font-weight: 900;
animation: textFlash 0.3s infinite steps(2);
}

/* Message Styling */
.message {
font-size: 1.5rem;
color: #333;
font-weight: bold;
margin-bottom: 30px;
}

/* Flashing Button */
.action-btn {
color: white;
border: 4px solid #000;
padding: 15px 40px;
font-size: 1.5rem;
font-weight: bold;
border-radius: 50px;
cursor: pointer;
transition: transform 0.1s;
animation: buttonFlash 0.2s infinite linear;
}

.action-btn:hover {
transform: scale(1.1);
}

/* --- ANIMATIONS --- */

/* Background Gradient Movement */
@keyframes gradientShift {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

/* Rapid Border Color Flash */
@keyframes borderFlash {
0% { border-color: #00ff00; box-shadow: 0 0 30px #00ff00; }
50% { border-color: #ff00ff; box-shadow: 0 0 30px #ff00ff; }
100% { border-color: #00ffff; box-shadow: 0 0 30px #00ffff; }
}

/* Rapid Text Color Flash */
@keyframes textFlash {
0% { color: #ff0000; }
33% { color: #0000ff; }
66% { color: #f39c12; }
100% { color: #ff0000; }
}

/* Rapid Button Flash */
@keyframes buttonFlash {
0% { background-color: #ffff00; color: #000; }
100% { background-color: #000000; color: #fff; }
}
</style>
</head>
<body>

<div class="card">
<h1 class="title">HAPPY<br>BIRTHDAY!</h1>
<p class="message">Wishing you an absolutely epic day! 🎉🥳</p>
<button class="action-btn" onclick="alert('🥳 Make a wish! 🎉')">CELEBRATE!</button>
</div>

</body>
</html>
